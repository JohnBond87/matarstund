<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Bodoni+Moda:opsz,wght@6..96,700&display=swap" rel="stylesheet">
<style>
:root{--red:#D81E30;--cream:#FDF8E2;--green:#39552C;--orange:#E65100;--blue:#1565C0;--soft:rgba(57,85,44,.06);}
*{box-sizing:border-box;}
body{font-family:Manrope,Arial,sans-serif;background:var(--cream);margin:0;color:#222;}
.hero{padding:14px 12px 8px;text-align:center;}
.kort{max-width:1040px;margin:0 auto 10px;background:var(--green);color:white;border-radius:18px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.kort-nafn{font-size:20px;font-weight:700;}
.kort-sub{font-size:12px;opacity:.8;margin-top:2px;}
.brand{max-width:1040px;margin:0 auto;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;}
.pill{border:2px solid var(--red);color:var(--red);background:transparent;padding:8px 16px;border-radius:999px;font-weight:700;cursor:pointer;transition:.18s;font-family:inherit;font-size:13px;}
.pill.active,.pill:hover{background:var(--red);color:#fff;}
.pill.green-pill{border-color:var(--green);color:var(--green);}
.pill.green-pill.active,.pill.green-pill:hover{background:var(--green);color:#fff;}
.val-skilja{width:1px;height:28px;background:#ccc;}
.days{display:none;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px auto 10px;}
.daybtn{background:var(--cream);color:var(--green);border:2px solid var(--red);border-radius:18px;padding:8px 16px;min-width:130px;font-weight:700;cursor:pointer;transition:.18s;font-family:inherit;font-size:13px;}
.daybtn:hover,.daybtn.active{background:var(--red);color:#fff;}
.weekdropdown{position:relative;display:inline-block;}
.weektrigger{border:2px solid var(--red);color:var(--red);background:var(--cream);padding:8px 16px;border-radius:999px;font-weight:700;cursor:pointer;transition:.18s;font-family:inherit;min-width:160px;font-size:13px;}
.weektrigger:hover,.weektrigger.open{background:var(--red);color:#fff;}
.weekmenu{display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:300px;background:#fffefc;border:2px solid var(--red);border-radius:18px;box-shadow:0 10px 24px rgba(0,0,0,.18);z-index:50;overflow:hidden;text-align:left;}
.weekmenu.open{display:block;}
.weekoption{padding:12px 16px;cursor:pointer;color:var(--green);font-weight:700;font-family:inherit;background:#fffefc;font-size:13px;}
.weekoption:hover{background:#fff3e0;}
.weekoption.active{background:rgba(57,85,44,.08);color:var(--red);}
.weekcheck{display:inline-block;width:22px;color:var(--red);font-weight:700;}
.card{max-width:1040px;margin:0 auto;padding:0 18px 40px;}
.dayhead{display:flex;gap:10px;align-items:baseline;justify-content:center;margin:8px 0 12px;}
.daytitle{font-family:"Bodoni Moda",serif;color:var(--red);font-size:52px;margin:0;text-transform:uppercase;}
.datestr{color:var(--red);font-weight:600;font-size:17px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:720px){.grid2{grid-template-columns:1fr;}}
.band{background:var(--soft);padding:18px;border:2px solid var(--red);border-radius:22px;margin:12px 0;}
.bandtitle{display:flex;align-items:center;gap:10px;color:var(--red);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:0 0 10px;font-size:14px;}
.lbl{font-weight:600;font-size:12px;color:#777;margin:8px 0 3px;text-transform:uppercase;letter-spacing:.4px;}
.dish-group{margin-bottom:8px;}
.dish-name{font-size:16px;font-weight:700;color:var(--green);}
.vara-list{margin-top:3px;padding-left:6px;}
.vara-item{font-size:13px;color:#555;display:inline;}
.vara-item::after{content:", ";}
.vara-item:last-child::after{content:"";}
.vara-g{color:#aaa;font-weight:400;font-size:11px;}
/* LEIÐBEININGAR */
.leid-band{background:#fff8f1;padding:18px;border:2px solid var(--orange);border-radius:22px;}
.leid-titill{display:flex;align-items:center;gap:10px;color:var(--orange);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:0 0 10px;font-size:14px;}
.leid-row{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0e8dc;}
.leid-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.leid-nafn{font-size:13px;font-weight:700;color:var(--orange);margin-bottom:4px;}
.leid-texti{font-size:13px;color:#333;line-height:1.6;white-space:pre-line;}
.leid-vantar{font-size:13px;color:#bbb;font-style:italic;}
/* SÉRFÆÐITAFLA */
.serf-band{background:#fff5f5;padding:18px;border:2px solid var(--red);border-radius:22px;margin:12px 0;}
.serf-titill{display:flex;align-items:center;gap:8px;color:var(--red);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin:0 0 10px;font-size:14px;}
.badge{background:var(--red);color:white;border-radius:999px;padding:1px 8px;font-size:12px;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--red);}
th{padding:9px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.4px;color:white;}
td{padding:9px 10px;font-size:13px;border-bottom:1px solid #f0f0f0;}
tr:last-child td{border-bottom:none;}
tr.rautt td{background:#FFEBEE;}
tr.gult td{background:#FFFDE7;}
.sbadge{display:inline-block;border-radius:999px;padding:2px 7px;font-size:11px;font-weight:700;}
.sbadge.hlidar{background:#E3F2FD;color:var(--blue);}
.sbadge.serfaedi{background:#FFF3E0;color:var(--orange);}
.sbadge.enginn{background:#FFEBEE;color:var(--red);}
.empty{text-align:center;padding:16px;color:#aaa;font-style:italic;font-size:13px;}
.loading{text-align:center;padding:40px;color:#888;}
.not-found{text-align:center;padding:40px;}
.not-found h2{color:var(--red);}
@media(max-width:600px){
  .daytitle{font-size:28px;}
  .daybtn{min-width:0;padding:7px 10px;font-size:12px;}
}
</style>
</head>
<body>

<header class="hero">
  <div id="kort" style="display:none" class="kort">
    <div>
      <div class="kort-nafn" id="kortNafn">🍳 Eldhús</div>
      <div class="kort-sub" id="kortSub"></div>
    </div>
    <div style="font-size:32px">👨‍🍳</div>
  </div>

  <div class="brand">
    <button id="btnGrunn" class="pill green-pill" style="display:none" onclick="setSkoliTegund('Grunnskóli')">🏫 Grunnskóli / Frístund</button>
    <button id="btnLeik" class="pill green-pill" style="display:none" onclick="setSkoliTegund('Leikskóli')">🎈 Leikskóli</button>
    <div id="valSkilja" class="val-skilja" style="display:none"></div>
    <button id="btnHadegi" class="pill active" onclick="setMaltid('hadegi')">🍽️ Hádegismatur</button>
    <button id="btnHressing" class="pill" onclick="setMaltid('hressing')">🧃 Síðdegishressing</button>
    <div class="val-skilja"></div>
    <div class="weekdropdown" id="weekDropdown">
      <button id="weekTrigger" class="weektrigger" onclick="toggleWeekMenu()">📅 Þessi vika ▼</button>
      <div id="weekMenu" class="weekmenu">
        <div id="weekOpt0" class="weekoption" onclick="selectWeekFromMenu(0)"></div>
        <div id="weekOpt1" class="weekoption" onclick="selectWeekFromMenu(1)"></div>
      </div>
    </div>
  </div>
</header>

<nav class="days" id="dayNav">
  <button class="daybtn" onclick="selectDay('Man')">Mánudagur</button>
  <button class="daybtn" onclick="selectDay('Tri')">Þriðjudagur</button>
  <button class="daybtn" onclick="selectDay('Mid')">Miðvikudagur</button>
  <button class="daybtn" onclick="selectDay('Fim')">Fimmtudagur</button>
  <button class="daybtn" onclick="selectDay('Fos')">Föstudagur</button>
</nav>

<main class="card" id="mainArea">
  <div class="loading">Hleður...</div>
</main>

<script>
var EXCEL_URL='https://johnbond87.github.io/matarstund/Matarstund_v12.xlsx';
var ICON='https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827';
var MONTHS=['janúar','febrúar','mars','apríl','maí','júní','júlí','ágúst','september','október','nóvember','desember'];
var DNAME={Man:'Mánudagur',Tri:'Þriðjudagur',Mid:'Miðvikudagur',Fim:'Fimmtudagur',Fos:'Föstudagur'};

var eldhusId='', currentDay='', currentWeekOffset=0;
var currentSkoliTegund='Leikskóli', currentMaltid='hadegi';
var mRows=[], ofnaemiHadegi=[], ofnaemiSidegi=[];
var tengdirSkolar=[], skolaTegundMap={}, eldhusForskeyti='';

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nm(s){return(s||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function cl(s){return(s===null||s===undefined)?'':s.toString().trim();}

function findCol(headers,needle){
  for(var i=0;i<headers.length;i++){if(nm(headers[i]).indexOf(nm(needle))>=0)return i;}
  return -1;
}

function excelSerialToDate(n){
  if(typeof n!=='number'||!isFinite(n))return null;
  var d=new Date(1899,11,30);d.setDate(d.getDate()+Math.floor(n));d.setHours(0,0,0,0);return d;
}

function parseDate(s){
  if(typeof s==='number')return excelSerialToDate(s);
  if(!s)return null;
  var t=s.toString().trim(),m;
  m=t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m){var d=new Date(+m[1],+m[2]-1,+m[3]);d.setHours(0,0,0,0);return d;}
  m=t.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){var d2=new Date(+m[3],+m[2]-1,+m[1]);d2.setHours(0,0,0,0);return d2;}
  return null;
}

function mondayOfWeek(d){var x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-(x.getDay()+6)%7);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);x.setHours(0,0,0,0);return x;}
function weekRange(off){var s=addDays(mondayOfWeek(new Date()),off*7);return{start:s,end:addDays(s,5)};}
function inWeekRange(date,off){if(!date)return false;var wr=weekRange(off),d=new Date(date);d.setHours(0,0,0,0);return d>=wr.start&&d<=wr.end;}
function dayKey(date){var d=date.getDay();return d===1?'Man':d===2?'Tri':d===3?'Mid':d===4?'Fim':d===5?'Fos':null;}
function fmtDate(d){return d.getDate()+'. '+MONTHS[d.getMonth()];}
function getDagStr(off,dk){var wr=weekRange(off);var d=addDays(wr.start,{Man:0,Tri:1,Mid:2,Fim:3,Fos:4}[dk]);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function simpleWeekLabel(off){return off===0?'Þessi vika':'Næsta vika';}
function weekLabel(off){var wr=weekRange(off);return simpleWeekLabel(off)+' ('+fmtDate(wr.start)+' – '+fmtDate(wr.end)+')';}
function updateWeekSelectLabels(){
  var t=document.getElementById('weekTrigger'),o0=document.getElementById('weekOpt0'),o1=document.getElementById('weekOpt1');
  if(t)t.textContent='📅 '+simpleWeekLabel(currentWeekOffset)+' ▼';
  if(o0){o0.innerHTML='<span class="weekcheck">'+(currentWeekOffset===0?'✓':'')+'</span>'+weekLabel(0);o0.classList.toggle('active',currentWeekOffset===0);}
  if(o1){o1.innerHTML='<span class="weekcheck">'+(currentWeekOffset===1?'✓':'')+'</span>'+weekLabel(1);o1.classList.toggle('active',currentWeekOffset===1);}
}
function toggleWeekMenu(){var m=document.getElementById('weekMenu'),t=document.getElementById('weekTrigger');var open=!m.classList.contains('open');m.classList.toggle('open',open);if(t)t.classList.toggle('open',open);updateWeekSelectLabels();}
function closeWeekMenu(){var m=document.getElementById('weekMenu'),t=document.getElementById('weekTrigger');if(m)m.classList.remove('open');if(t)t.classList.remove('open');}
function selectWeekFromMenu(off){currentWeekOffset=off;updateWeekSelectLabels();closeWeekMenu();renderDay();}

function setSkoliTegund(t){
  currentSkoliTegund=t;
  document.getElementById('btnGrunn').classList.toggle('active',t==='Grunnskóli');
  document.getElementById('btnLeik').classList.toggle('active',t==='Leikskóli');
  renderDay();
}
function setMaltid(t){
  currentMaltid=t;
  document.getElementById('btnHadegi').classList.toggle('active',t==='hadegi');
  document.getElementById('btnHressing').classList.toggle('active',t==='hressing');
  renderDay();
}
function selectDay(dk){
  currentDay=dk;
  document.querySelectorAll('.daybtn').forEach(function(b){b.classList.toggle('active',b.getAttribute('onclick').indexOf("'"+dk+"'")>=0);});
  renderDay();
}

function parseMenuRows(rows){
  var hidx=-1;
  for(var i=0;i<rows.length;i++){if(nm(cl(rows[i][0]))==='dagsetning'){hidx=i;break;}}
  if(hidx<0)return[];
  var headers=rows[hidx].map(function(h){return cl(h).replace(/\n/g,' ').replace(/\s+/g,' ').trim();});
  function fc(n){return findCol(headers,n);}
  var C={
    DATE:0,GILDIR:fc('gildir'),MEAL:fc('máltíðartegund'),
    VARA:fc('vara / réttur'),BIRTING:fc('birtingarnafn'),
    SK_LEIK:(function(){var v=fc('skammtur leikskóli');return v>=0?v:fc('skammtur leikskoli');}()),
    SK_GRUNN:(function(){var v=fc('skammtur grunnskóli');return v>=0?v:fc('skammtur grunnskoli');}()),
    INN:(function(){var v=fc('innihaldslýsing');return v>=0?v:fc('innihaldslysing');}()),
    OFN:(function(){var v=fc('ofnæmisvaldar');return v>=0?v:fc('ofnaemisvaldar');}()),
    FYR:fc('fyrirvari'),
    ORKA:fc('orka'),FITA:fc('fita'),
    METT:(function(){var v=fc('mettuð');return v>=0?v:fc('mettud');}()),
    KOLV:fc('kolvetni'),
    PROT:(function(){var v=fc('prótein');return v>=0?v:fc('protein');}()),
    SALT:fc('salt'),
  };
  function g(arr,c){if(c<0)return'';var v=arr[c];return(v===null||v===undefined||v==='')?'':v.toString().trim();}
  function gn(arr,c){if(c<0)return null;var v=parseFloat(g(arr,c));return isNaN(v)?null:v;}
  var out=[],autoId=1000,curDate=null,curMeal='',curGildir='Bæði',curGid=null;
  for(var r=hidx+1;r<rows.length;r++){
    var arr=rows[r];
    if(!arr||arr.every(function(v){return!v&&v!==0;}))continue;
    var rawDate=arr[C.DATE];
    var d=typeof rawDate==='number'?excelSerialToDate(rawDate):parseDate(rawDate);
    var meal=g(arr,C.MEAL),gildir=g(arr,C.GILDIR),vara=g(arr,C.VARA);
    if(d)curDate=d;
    if(meal)curMeal=meal;
    if(gildir)curGildir=gildir;
    if(!curDate||!curMeal)continue;
    if(!vara){
      var gid='xl_'+(autoId++);curGid=gid;
      out.push({_gid:gid,_d:new Date(curDate),_isMain:true,_meal:curMeal,_gildir:gildir||curGildir,_vara:'',_birting:g(arr,C.BIRTING)});
    } else if(curGid){
      out.push({_gid:curGid,_d:new Date(curDate),_isMain:false,_meal:curMeal,_gildir:gildir||curGildir,
        _vara:vara,_birting:g(arr,C.BIRTING),
        _skLeik:gn(arr,C.SK_LEIK),_skGrunn:gn(arr,C.SK_GRUNN),
        _inn:g(arr,C.INN),_ofn:g(arr,C.OFN),_fyr:g(arr,C.FYR),
        _orka:gn(arr,C.ORKA),_fita:gn(arr,C.FITA),_mett:gn(arr,C.METT),
        _kolv:gn(arr,C.KOLV),_prot:gn(arr,C.PROT),_salt:gn(arr,C.SALT)});
    }
  }
  return out;
}

// LESA OFNÆMISMATSEÐIL
// Skilar map: { "nafn|dagsetning": { faer, ofnaemi, athugasemd } }

function parseOfnaemismatsedil(rows){
  var map={};
  // Finna hausalínu
  var hidx=-1;
  for(var i=0;i<rows.length;i++){
    if(nm(cl(rows[i][0]))==='dagsetning'){hidx=i;break;}
  }
  if(hidx<0)return map;
  // C1=dag, C2=skoli, C3=nafn, C4=deild, C5=ofnaemi, C6=ath, C7=faer
  for(var r=hidx+1;r<rows.length;r++){
    var dag=cl(rows[r][0]),nafn=cl(rows[r][2]),faer=cl(rows[r][6]);
    var ofnaemi=cl(rows[r][4]),ath=cl(rows[r][5]);
    if(!nafn||!dag)continue;
    var key=nm(nafn)+'|'+dag;
    map[key]={faer:faer,ofnaemi:ofnaemi,athugasemd:ath};
  }
  return map;
}

// LESA BARN ÚR NEMENDASKRÁ

// Les eldunarleiðbeiningar úr Grunnmatseðli U dálk (index 20)
function parseLeidMap(rows){
  var map={};
  var hi=-1;
  for(var i=0;i<rows.length;i++){if(nm(cl(rows[i][0]))==='dagsetning'){hi=i;break;}}
  if(hi<0)return map;
  var H=rows[hi].map(function(h){return cl(h).replace(/\n/g,' ').trim();});
  var C_MEAL=findCol(H,'máltíðartegund');
  var C_VARA=findCol(H,'vara / réttur');
  var C_BIRTING=findCol(H,'birtingarnafn');
  var C_LEID=(function(){var v=findCol(H,'eldunarleiðbeiningar');return v>=0?v:findCol(H,'eldunarleidbeining');}());
  if(C_LEID<0)return map;
  for(var r=hi+1;r<rows.length;r++){
    var meal=cl(rows[r][C_MEAL]);
    var vara=cl(rows[r][C_VARA]);
    var birting=C_BIRTING>=0?cl(rows[r][C_BIRTING]):'';
    var leid=cl(rows[r][C_LEID]);
    if(!meal||vara||!birting||!leid||leid.length<5)continue;
    map[birting]=leid;
  }
  return map;
}

// Les Ofnæmismatseðil - skilar array (ekki map)
function parseOfnaemiArray(rows){
  var list=[];
  var hidx=-1;
  for(var i=0;i<rows.length;i++){if(nm(cl(rows[i][0]))==='dagsetning'){hidx=i;break;}}
  if(hidx<0)return list;
  for(var r=hidx+1;r<rows.length;r++){
    var dag=cl(rows[r][0]),skoli=cl(rows[r][1]),nafn=cl(rows[r][2]);
    var deild=cl(rows[r][3]),ofnaemi=cl(rows[r][4]),ath=cl(rows[r][5]),faer=cl(rows[r][6]);
    if(!nafn||!dag)continue;
    if(skoli.indexOf('\u{1F4CD}')>=0||nafn.indexOf('\u{1F4CD}')>=0)continue;
    list.push({dag:dag,skoli:skoli,nafn:nafn,deild:deild,ofnaemi:ofnaemi,ath:ath,faer:faer});
  }
  return list;
}

function parseOfnaemiSidegi(rows){
  return parseOfnaemiArray(rows);
}

function parseSkólalisti(rows){
  var list=[];
  for(var r=2;r<rows.length;r++){
    var nafn=cl(rows[r][0]);if(!nafn)continue;
    list.push({nafn:nafn,tegund:cl(rows[r][1]),eldhus:cl(rows[r][6]),flokkun:cl(rows[r][7])});
  }
  return list;
}

function getSkolaNofn(){
  return tengdirSkolar.filter(function(s){
    var fk=skolaTegundMap[s]||'';
    if(currentSkoliTegund==='Grunnskóli')return fk==='1';
    if(currentSkoliTegund==='Leikskóli')return fk==='2';
    return true;
  });
}

// ═══ RENDER ═══
var leidMap={};

function renderDay(){
  var el=document.getElementById('mainArea');
  if(!currentDay){el.innerHTML='';return;}
  var off=currentWeekOffset;
  var ds=getDagStr(off,currentDay);
  var skolaNofn=getSkolaNofn();

  // Finna dagsetninguna
  var dagRows=mRows.filter(function(r){return r._isMain&&r._d&&inWeekRange(r._d,off)&&dayKey(r._d)===currentDay;});
  var dt=dagRows.length?dagRows[0]._d:null;
  var html='<div class="dayhead"><h1 class="daytitle">'+esc(DNAME[currentDay])+'</h1>'+(dt?'<span class="datestr">('+esc(fmtDate(dt))+')</span>':'')+'</div>';

  if(currentMaltid==='hadegi'){
    html+=renderHadegi(off,ds,skolaNofn);
  } else {
    html+=renderHressing(off,ds,skolaNofn);
  }
  el.innerHTML=html;
}

function getMealMain(off,meal){
  return mRows.filter(function(r){
    if(!r._isMain||!r._d||!inWeekRange(r._d,off))return false;
    if(dayKey(r._d)!==currentDay)return false;
    if(nm(r._meal)!==nm(meal))return false;
    return r._gildir==='Bæði'||nm(r._gildir)===nm(currentSkoliTegund);
  });
}

function buildMealSection(off,meals,lblShow){
  var skKey=currentSkoliTegund==='Leikskóli'?'_skLeik':'_skGrunn';
  var html='';
  meals.forEach(function(meal){
    var main=getMealMain(off,meal);
    if(!main.length)return;
    var varar=mRows.filter(function(r){return !r._isMain&&main.some(function(m){return m._gid===r._gid;});});
    main.forEach(function(m){
      var dn=m._birting||meal;
      var vl=varar.filter(function(v){return v._gid===m._gid;});
      var vStr=vl.map(function(v){var sk=v[skKey];return(v._birting||v._vara)+(sk?' ('+sk+'g)':'');}).join(', ');
      if(lblShow)html+='<div class="lbl">'+esc(meal)+'</div>';
      html+='<div class="dish-group"><div class="dish-name">'+esc(dn)+'</div>'+(vStr?'<div class="vara-list"><span class="vara-item">'+esc(vStr)+'</span></div>':'')+'</div>';
    });
  });
  return html;
}

function renderHadegi(off,ds,skolaNofn){
  var html='<div class="grid2">';

  // MATSEÐILL
  var HADEGI_MEALS=['Ávaxtastund','Aðalréttur','Hliðarréttur','Meðlæti','Meðlætisbar',
    'Ofnæmisréttur 1','Ofnæmisréttur 2','Ofnæmisréttur 3','Ofnæmisréttur 4'];
  var matsHtml=buildMealSection(off,HADEGI_MEALS,true);
  html+='<div class="band"><div class="bandtitle">🍽️ Matseðill</div>';
  html+=matsHtml||'<div class="empty">Engar máltíðar skráðar.</div>';
  html+='</div>';

  // ELDUNARLEIÐBEININGAR
  var leidHtml='';
  var LEID_MEALS=['Aðalréttur','Hliðarréttur','Ofnæmisréttur 1','Ofnæmisréttur 2','Ofnæmisréttur 3','Ofnæmisréttur 4'];
  var syndar=[];
  LEID_MEALS.forEach(function(meal){
    var main=getMealMain(off,meal);
    main.forEach(function(m){
      var dn=m._birting||meal;
      if(syndar.indexOf(dn)>=0)return;
      syndar.push(dn);
      var leid=leidMap[dn]||'';
      leidHtml+='<div class="leid-row"><div class="leid-nafn">'+esc(dn)+'</div>';
      leidHtml+=(leid&&leid.length>5&&leid.indexOf('vantar')<0)?'<div class="leid-texti">'+esc(leid)+'</div>':'<div class="leid-vantar">Eldunarleiðbeiningar vantar.</div>';
      leidHtml+='</div>';
    });
  });
  html+='<div class="leid-band"><div class="leid-titill">🔥 Upphitunarleiðbeiningar</div>';
  html+=leidHtml||'<div class="empty">Engar leiðbeiningar.</div>';
  html+='</div>';
  html+='</div>'; // lok grid2

  // SÉRFÆÐISLISTI
  var born=ofnaemiHadegi.filter(function(r){
    if(r.dag!==ds)return false;
    return skolaNofn.some(function(s){return nm(r.skoli)===nm(s);});
  });
  html+=renderSerfaediKassi(born,'⚠️ Sérfæðisþarfir');
  return html;
}

function renderHressing(off,ds,skolaNofn){
  var HRESS_MEALS=['Síðdegishressing','Síðdegishressing sérfæði 1','Síðdegishressing sérfæði 2',
    'Síðdegishressing sérfæði 3','Síðdegishressing sérfæði 4'];
  var matsHtml=buildMealSection(off,HRESS_MEALS,true);
  var html='<div class="band"><div class="bandtitle">🧃 Síðdegishressing</div>';
  html+=matsHtml||'<div class="empty">Engar hressingar skráðar.</div>';
  html+='</div>';

  var born=ofnaemiSidegi.filter(function(r){
    if(r.dag!==ds)return false;
    return skolaNofn.some(function(s){return nm(r.skoli)===nm(s);});
  });
  html+=renderSerfaediKassi(born,'🧃 Síðdegishressing — Sérfæðisþarfir');
  return html;
}

function renderSerfaediKassi(born,titill){
  var rautt=born.filter(function(b){return nm(b.faer).indexOf('enginn')>=0;});
  var annad=born.filter(function(b){return nm(b.faer).indexOf('enginn')<0;});
  var html='<div class="serf-band"><div class="serf-titill">'+esc(titill)+' <span class="badge">'+born.length+'</span></div>';
  if(!born.length){html+='<div class="empty">✅ Öll börn fá venjulega máltíð þennan dag.</div>';}
  else {
    if(rautt.length){html+='<p style="color:var(--red);font-weight:700;font-size:12px;margin:0 0 6px">🔴 Þurfa sérrrétt ('+rautt.length+')</p>';html+=buildTafla(rautt);}
    if(annad.length){if(rautt.length)html+='<div style="margin-top:10px"></div>';html+='<p style="color:var(--orange);font-weight:700;font-size:12px;margin:0 0 6px">🟡 Fá annan rétt ('+annad.length+')</p>';html+=buildTafla(annad);}
  }
  html+='</div>';
  return html;
}

function buildTafla(born){
  var html='<div style="overflow-x:auto"><table><thead><tr><th>Nafn</th><th>Deild</th><th>Skóli</th><th>Ofnæmi</th><th>Fær</th></tr></thead><tbody>';
  born.forEach(function(b){
    var fn=nm(b.faer);
    var cls=fn.indexOf('enginn')>=0?'enginn':fn.indexOf('hliðar')>=0||fn.indexOf('hlidar')>=0?'hlidar':'serfaedi';
    var trCls=cls==='enginn'?'rautt':cls!=='hlidar'?'gult':'';
    html+='<tr class="'+trCls+'"><td><strong>'+esc(b.nafn)+'</strong></td><td>'+esc(b.deild)+'</td><td>'+esc(b.skoli)+'</td><td>'+esc(b.ofnaemi)+(b.ath?'<br><small style="color:#888">'+esc(b.ath)+'</small>':'')+'</td><td><span class="sbadge '+cls+'">'+esc(b.faer||'—')+'</span></td></tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded',function(){
  eldhusId=new URLSearchParams(window.location.search).get('id')||'';
  window.addEventListener('message',function(ev){
    if(ev.data&&typeof ev.data==='string'&&!eldhusId){eldhusId=ev.data;load();}
  });
  document.addEventListener('click',function(e){var dd=document.getElementById('weekDropdown');if(dd&&!dd.contains(e.target))closeWeekMenu();});
  if(!eldhusId){document.getElementById('mainArea').innerHTML='<div class="not-found"><h2>Hlekkur finnst ekki</h2></div>';return;}
  load();
});

function load(){
  fetch(EXCEL_URL,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.arrayBuffer();})
    .then(function(buf){
      var wb=XLSX.read(buf,{type:'array',cellDates:false,raw:false});
      var msRows=XLSX.utils.sheet_to_json(wb.Sheets['Grunnmatseðill'],{header:1,raw:false,defval:''});
      mRows=parseMenuRows(msRows);
      leidMap=parseLeidMap(msRows);
      ofnaemiHadegi=parseOfnaemiArray(XLSX.utils.sheet_to_json(wb.Sheets['Ofnæmismatseðill'],{header:1,raw:false,defval:''}));
      ofnaemiSidegi=parseOfnaemiSidegi(XLSX.utils.sheet_to_json(wb.Sheets['Ofnæmismatseðill síðdegi'],{header:1,raw:false,defval:''}));
      var slList=parseSkólalisti(XLSX.utils.sheet_to_json(wb.Sheets['Skólalisti'],{header:1,raw:false,defval:''}));

      eldhusForskeyti='';
      for(var i=0;i<slList.length;i++){
        if(slList[i].eldhus&&nm(slList[i].eldhus).indexOf(nm(eldhusId))>=0){
          var fk=slList[i].flokkun;if(fk){eldhusForskeyti=fk.split('-')[0];break;}
        }
      }
      tengdirSkolar=[];skolaTegundMap={};
      var aðalNafn='';
      for(var j=0;j<slList.length;j++){
        var s=slList[j];if(!s.flokkun)continue;
        if(s.flokkun.split('-')[0]===eldhusForskeyti){
          tengdirSkolar.push(s.nafn);
          skolaTegundMap[s.nafn]=s.flokkun.split('-')[1];
          if(s.tegund==='Grunnskóli'&&!aðalNafn)aðalNafn=s.nafn;
        }
      }
      if(!aðalNafn&&tengdirSkolar.length)aðalNafn=tengdirSkolar[0];

      document.getElementById('kort').style.display='flex';
      document.getElementById('kortNafn').textContent='🍳 '+aðalNafn;
      document.getElementById('kortSub').textContent='Þjónar: '+tengdirSkolar.join(', ');

      var hasGrunn=tengdirSkolar.some(function(s){return skolaTegundMap[s]==='1';});
      var hasLeik=tengdirSkolar.some(function(s){return skolaTegundMap[s]==='2';});
      if(hasGrunn&&hasLeik){
        document.getElementById('btnGrunn').style.display='';
        document.getElementById('btnLeik').style.display='';
        document.getElementById('valSkilja').style.display='';
        document.getElementById('btnGrunn').classList.add('active');
        currentSkoliTegund='Grunnskóli';
      } else if(hasLeik){
        currentSkoliTegund='Leikskóli';
      } else {
        currentSkoliTegund='Grunnskóli';
      }

      console.log('Hlaðið: mRows='+mRows.length+' leid='+Object.keys(leidMap).length+' ofnaemiH='+ofnaemiHadegi.length+' ofnaemiS='+ofnaemiSidegi.length);

      document.getElementById('dayNav').style.display='flex';
      updateWeekSelectLabels();
      var dk=dayKey(new Date())||'Man';
      selectDay(dk);
    })
    .catch(function(err){
      document.getElementById('mainArea').innerHTML='<div class="loading">Villa: '+esc(String(err))+'</div>';
    });
}
</script>

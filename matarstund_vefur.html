<!DOCTYPE html>
<!-- Matarstund vefur - lagfært: sérsniðinn viku-dropdown með dagsetningum í vali -->
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Bodoni+Moda:opsz,wght@6..96,700&display=swap" rel="stylesheet">
<style>
:root { --red: #D81E30; --cream: #FDF8E2; --green: #39552C; --soft: rgba(57,85,44,.06); }
* { box-sizing: border-box; }
body { font-family: Manrope, Arial, sans-serif; background: var(--cream); margin: 0; color: #222; }
body::after { content: ""; position: fixed; right: -80px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; opacity: .16; background: url('https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827') no-repeat center/contain; pointer-events: none; z-index: 0; }
.hero { position: relative; z-index: 10; padding: 14px 12px 8px; text-align: center; }
.brand { max-width: 1040px; margin: 0 auto; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
.pill { border: 2px solid var(--red); color: var(--red); background: transparent; padding: 10px 18px; border-radius: 999px; font-weight: 700; cursor: pointer; transition: .18s; font-family: inherit; }
.pill.active, .pill:hover { background: var(--red); color: #fff; }

.weekdropdown { position: relative; display: inline-block; }
.weektrigger { border: 2px solid var(--red); color: var(--red); background: var(--cream); padding: 10px 18px; border-radius: 999px; font-weight: 700; cursor: pointer; transition: .18s; font-family: inherit; min-width: 170px; }
.weektrigger:hover, .weektrigger.open { background: var(--red); color: #fff; }
.weekmenu { display: none; position: absolute; top: calc(100% + 8px); right: 0; min-width: 310px; background: #fffefc; border: 2px solid var(--red); border-radius: 18px; box-shadow: 0 10px 24px rgba(0,0,0,.18); z-index: 50; overflow: hidden; text-align: left; }
.weekmenu.open { display: block; }
.weekoption { padding: 12px 16px; cursor: pointer; color: var(--green); font-weight: 700; font-family: inherit; background: #fffefc; }
.weekoption:hover { background: #fff3e0; }
.weekoption.active { background: rgba(57,85,44,.08); color: var(--red); }
.weekcheck { display: inline-block; width: 22px; color: var(--red); font-weight: 700; }

.weekselect { border: 2px solid var(--red); color: var(--red); background: var(--cream); padding: 10px 18px; border-radius: 999px; font-weight: 700; cursor: pointer; transition: .18s; font-family: inherit; min-width: 220px; }
.weekselect:focus { outline: none; box-shadow: 0 0 0 3px rgba(216,30,48,.18); }
.weeknav { display: none; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 8px auto 8px; }
.weekbtn { background: var(--cream); color: var(--green); border: 2px solid var(--green); border-radius: 18px; padding: 10px 18px; min-width: 150px; font-weight: 700; cursor: pointer; transition: .18s; font-family: inherit; }
.weekbtn:hover, .weekbtn.active { background: var(--green); color: #fff; }
.days { display: none; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 8px auto 14px; }
.daybtn { background: var(--cream); color: var(--green); border: 2px solid var(--red); border-radius: 18px; padding: 10px 18px; min-width: 140px; font-weight: 700; cursor: pointer; transition: .18s; font-family: inherit; }
.daybtn:hover, .daybtn.active { background: var(--red); color: #fff; }
.card { max-width: 980px; margin: 0 auto; padding: 0 18px 8px; position: relative; z-index: 1; }
.dayhead { display: flex; gap: 10px; align-items: baseline; justify-content: center; margin: 8px 0 14px; }
.daytitle { font-family: "Bodoni Moda", serif; color: var(--red); font-size: 56px; margin: 0; text-transform: uppercase; }
@media (max-width: 480px) {
  .daytitle { font-size: 26px; }
  .dayhead { flex-direction: column; align-items: center; gap: 2px; }
  .datestr { font-size: 15px; }
  .modalbox { padding: 16px 14px 18px; width: 96%; max-height: 88vh; height: auto; border-radius: 16px; }
  .nutable th, .nutable td { padding: 7px 5px; font-size: 12px; }
  .nutable th { font-size: 11px; }
  .band { padding: 14px; }
  .daybtn, .weekbtn { min-width: 0; padding: 8px 12px; font-size: 13px; }
  .days { gap: 8px; }
  .weekmenu { min-width: 280px; right: 50%; transform: translateX(50%); }
}

.datestr { color: var(--red); font-weight: 600; font-size: 18px; }
.band { background: var(--soft); padding: 20px; border: 2px solid var(--red); border-radius: 24px; margin: 14px 0; }
.bandtitle { display: flex; align-items: center; gap: 10px; color: var(--red); font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin: 0 0 10px; }
.bandtitle img { width: 20px; height: 20px; }
.lbl { font-weight: 500; font-size: 14px; color: #111; margin: 8px 0 4px; }
.dish { font-size: 18px; margin-bottom: 4px; }
.clickable { cursor: pointer; color: var(--green); font-weight: 700; padding: 2px 4px; border-radius: 8px; text-decoration: underline; text-decoration-style: dotted; }
.clickable::before { content: ""; display: inline-block; width: 20px; height: 20px; margin-right: 6px; border-radius: 999px; border: 1px solid currentColor; background: url('https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827') no-repeat center/contain; vertical-align: middle; }
.clickable:hover { background: #e9f3ea; }
.hint { max-width: 980px; margin: 0 auto 8px; padding: 0 18px; font-size: 14px; color: #39552C; display: none; align-items: center; gap: 6px; }
.actions { display: flex; justify-content: center; margin: 18px 0 28px; }
.savebtn { background: #fff; border: 2px solid var(--red); color: var(--red); padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.savebtn:hover { background: var(--red); color: #fff; }
.modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.5); align-items: center; justify-content: center; padding: 16px; }
.modal.open { display: flex; }
.modal.open { display: flex; align-items: center; justify-content: center; }
.modalbox { background: #fffefc; position: relative; padding: 28px 30px 30px; width: 92%; max-width: 860px; max-height: 88vh; height: auto; box-sizing: border-box; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,.3); display: flex; flex-direction: column; border: 2px solid var(--red); border-radius: 24px; }
.modalscroll { flex: 0 1 auto; overflow-y: auto; padding-right: 12px; margin-top: 8px; max-height: calc(88vh - 70px); }
.closebtn { position: absolute; top: 16px; right: 20px; font-size: 22px; line-height: 1; cursor: pointer; color: #aaa; background: none; border: none; font-family: inherit; }
.closebtn:hover { color: #333; }
.modaltitle { color: var(--green); font-size: 26px; font-weight: 700; margin: 0 0 20px; }
.varabox { background: #fff8f1; border-left: 5px solid #FF7D39; padding: 16px; border-radius: 12px; margin-bottom: 14px; }
.varanafn { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.varamagn { font-size: 13px; color: #888; margin-bottom: 6px; }
.varainn { font-size: 14px; margin-bottom: 6px; }
.varaofn { font-size: 14px; color: #C0392B; font-weight: 600; }
.varafyr { font-size: 14px; color: #E65100; font-weight: 500; margin-top: 4px; }
.nutable { width: 100%; border-collapse: collapse; margin-top: 16px; }
.nutable th, .nutable td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 15px; }
.nutable th { background: var(--green); color: #fff; text-transform: uppercase; letter-spacing: .5px; font-size: 13px; }
.nutable tr:nth-child(even) td { background: #f9f9f9; }

.fruitlead { font-size: 18px; font-weight: 700; color: var(--green); margin: 4px 0 8px; }
.fruittext { font-size: 15px; line-height: 1.55; margin: 0 0 10px; color: #333; }
.fruitnote { font-size: 14px; font-weight: 700; color: var(--green); margin: 12px 0 8px; }
.fruittable { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fffefc; }
.fruittable th, .fruittable td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; font-size: 14px; }
.fruittable th { background: var(--green); color: #fff; text-transform: uppercase; letter-spacing: .4px; font-size: 12px; }
.fruittable tr:nth-child(even) td { background: #f9f9f9; }

.nonut { background: #fff6f6; border-left: 4px solid #e0e0e0; padding: 12px 16px; border-radius: 8px; color: #888; font-size: 14px; margin-top: 12px; }
.alertbox { background: #fff3e0; border-left: 4px solid #ff9800; padding: 12px 16px; border-radius: 12px; margin-bottom: 14px; font-weight: 600; }
.loading { text-align: center; padding: 40px; color: #888; }
.dish-group { margin-bottom: 10px; }
.dish-name { font-size: 18px; font-weight: 700; color: var(--green); }
.vara-list { margin-top: 3px; padding-left: 8px; }
.vara-item { font-size: 14px; color: #555; display: inline; }
.vara-item::after { content: ", "; }
.vara-item:last-child::after { content: ""; }
.vara-g { color: #aaa; font-weight: 400; font-size: 12px; }
.ing-link { color: var(--green); font-weight: 400; cursor: pointer; border-bottom: 1px dotted var(--green); display: inline; }
.ing-link:hover { background: #e9f3ea; border-radius: 4px; }
#ing-tooltip { display: none; position: fixed; background: #fff; border: 2px solid var(--green); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #333; box-shadow: 0 4px 16px rgba(0,0,0,.2); z-index: 9999; max-width: 300px; pointer-events: none; }
.modalsub { color: var(--green); font-size: 18px; margin: 20px 0 10px; font-weight: 700; }
.accordion { border: 1px solid #e0e0e0; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.acc-hdr { background: #fff3e0; padding: 12px 16px; cursor: pointer; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px; color: #E65100; transition: background .15s; }
.acc-hdr:hover { background: #ffe0b2; }
.acc-icon { font-size: 20px; font-weight: 700; width: 20px; text-align: center; flex-shrink: 0; }
.acc-body { padding: 12px 16px; background: #fff; }
</style>
</head>
<body>

<header class="hero">
  <div class="brand">
    <button id="btnLeik" class="pill" onclick="selectSkoli('Leikskoli')">LEIKSKÓLI</button>
    <button id="btnGrun" class="pill" onclick="selectSkoli('Grunnskoli')">GRUNNSKÓLI</button>
    <div id="weekDropdown" class="weekdropdown">
      <button id="weekTrigger" class="weektrigger" type="button" onclick="toggleWeekMenu()">📅 Þessi vika ▼</button>
      <div id="weekMenu" class="weekmenu">
        <div id="weekOpt0" class="weekoption" onclick="selectWeekFromMenu(0)"></div>
        <div id="weekOpt1" class="weekoption" onclick="selectWeekFromMenu(1)"></div>
      </div>
    </div>
  </div>
</header>


<nav class="days" id="dayNav">
  <button class="daybtn" onclick="selectDay('Man')">Mánudagur</button>
  <button class="daybtn" onclick="selectDay('Tri')">Þriðjudagur</button>
  <button class="daybtn" onclick="selectDay('Mid')">Miðvikudagur</button>
  <button class="daybtn" onclick="selectDay('Fim')">Fimmtudagur</button>
  <button class="daybtn" onclick="selectDay('Fos')">Föstudagur</button>
</nav>

<main class="card" id="menuArea"></main>

<p class="hint" id="clickHint">
  <span style="display:inline-block;width:20px;height:20px;border-radius:999px;border:1px solid currentColor;background:url('https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827') no-repeat center/contain;"></span>
  Smelltu á rétt til að sjá innihaldslýsingu og ofnæmisvalda.
</p>

<div class="actions">
  <button class="savebtn" onclick="saveImage()">Sækja vikumatseðil</button>
</div>

<section id="weeklyPrint" style="display:none;background:#fff;padding:30px;border-radius:16px;max-width:900px;margin:10px auto;"></section>

<div id="ing-tooltip"></div>
<div id="infoModal" class="modal">
  <div class="modalbox">
    <button class="closebtn" onclick="closeModal()">x</button>
    <div id="modalContent" class="modalscroll"></div>
  </div>
</div>

<script>
var EXCEL_URL = 'https://raw.githubusercontent.com/JohnBond87/matarstund/main/Matarstund%20matse%C3%B0ill%20(2).xlsx';
var ICON = 'https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827';
var MONTHS = ['januar','februar','mars','april','mai','juni','juli','agust','september','oktober','november','desember'];
var DNAME = { Man:'Mánudagur', Tri:'Þriðjudagur', Mid:'Miðvikudagur', Fim:'Fimmtudagur', Fos:'Föstudagur' };
var NK = ['Orka (kcal/100g)','Fita (g/100g)','Mettuð fita (g/100g)','Kolvetni (g/100g)','Sykur (g/100g)','Prótein (g/100g)','Salt (g/100g)','Trefjar (g/100g)'];
var NL = ['Orka (kcal)','Fita','Mettud fita','Kolvetni','Sykur','Protein','Salt','Trefjar'];
var NU = ['kcal','g','g','g','g','g','g','g'];
var currentSkoli = null;
var currentDay = '';
var currentWeekOffset = 0; // 0 = þessi vika, 1 = næsta vika
var mRows = [], rbRows = [], vsRows = [];

function esc(s) {
  return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function nm(s) {
  return (s||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function cl(s) { return (s===null||s===undefined)?'':s.toString().trim(); }

function excelSerialToDate(n) {
  if(typeof n !== 'number' || !isFinite(n)) return null;
  var d = new Date(1899, 11, 30);
  d.setDate(d.getDate() + Math.floor(n));
  d.setHours(0,0,0,0);
  return d;
}

function sheetRows(wb, sheetName) {
  var ws = wb.Sheets[sheetName];
  if(!ws) return [];
  return XLSX.utils.sheet_to_json(ws, {header:1, raw:true, defval:''});
}

function makeObjects(rows, headerNeedle) {
  var hidx = -1;
  for(var i=0;i<rows.length;i++){
    if(rows[i].some(function(c){return nm(c).indexOf(nm(headerNeedle))>=0;})){ hidx=i; break; }
  }
  if(hidx<0) return [];
  var headers = rows[hidx].map(function(h){return cl(h).replace(/\n/g,' ').replace(/\s+/g,' ').trim();});
  var out=[];
  for(var r=hidx+1;r<rows.length;r++){
    var obj={}, has=false;
    for(var c=0;c<headers.length;c++){
      if(!headers[c]) continue;
      var val = rows[r][c];
      if(val!=='' && val!==null && val!==undefined) has=true;
      obj[headers[c]]=val;
    }
    if(has) out.push(obj);
  }
  return out;
}

function normalizeProductRows(rows){
  rows.forEach(function(r){
    Object.keys(r).forEach(function(k){
      var nk = nm(k);
      if(nk.indexOf('heiti voru')>=0) r.HeitiVoru = r[k];
      if(nk.indexOf('innihaldslysing')>=0) r['Innihaldslýsing'] = r[k];
      if(nk.indexOf('ofnaemisvaldar')>=0) r['Ofnæmisvaldar'] = r[k];
      if(nk.indexOf('fyrirvari')>=0) r['Fyrirvari'] = r[k];
    });
  });
  return rows;
}

function normalizeRecipeRows(rows){
  rows.forEach(function(r){
    Object.keys(r).forEach(function(k){
      var nk = nm(k);
      if(nk.indexOf('heiti rettar')>=0) r.HeitiRettar = r[k];
      var m = nk.match(/^magn (\d+)/);
      if(m) r['Magn '+m[1]+' (g)'] = r[k];
      m = nk.match(/^vara (\d+)/);
      if(m) r['Vara '+m[1]] = r[k];
    });
  });
  return rows;
}

function parseMenuRows(rows) {
  var hidx=-1;
  for(var i=0;i<rows.length;i++){
    if(nm(rows[i][0])==='dagsetning'){ hidx=i; break; }
  }
  if(hidx<0) return [];
  var headers = rows[hidx].map(function(h){return cl(h).replace(/\n/g,' ').replace(/\s+/g,' ').trim();});
  var out=[], currentDate=null, currentGroup=null, currentMeal='', currentGildir='Bæði';
  var autoId=1000;

  function objFromRow(arr){
    var o={};
    for(var c=0;c<headers.length;c++){
      if(headers[c]) o[headers[c]]=arr[c];
    }
    // normalísera dálkaheiti — þola bil og mismunandi útgáfur
    o['Dagsetning']             = o['Dagsetning'] || '';
    o['Gildir fyrir']           = o['Gildir fyrir'] || '';
    o['Máltíðartegund']         = o['Máltíðartegund'] || '';
    o['Tegund']                 = o['Tegund (Vara/Réttur)'] || o['Tegund'] || '';
    o['Vara / Réttur']          = o['Vara / Réttur'] || '';
    o['Birtingarnafn']          = o['Birtingarlýsing (vefur)'] || o['Birtingarlýsing  (vefur)'] || o['Birtingarnafn'] || '';
    o['Skammtur Leikskóli (g)'] = o['Skammtur Leikskóli (g)'] || o['Skammtur  Leikskóli (g)'] || o['Skammtur Leikskoli (g)'] || '';
    o['Skammtur Grunnskóli (g)']= o['Skammtur Grunnskóli (g)'] || o['Skammtur  Grunnskóli (g)'] || o['Skammtur Grunnskoli (g)'] || '';
    // sjálfvirkt-útfylltur innihald úr Excel formúlum
    o['Innihaldslýsing']        = o['Innihaldslýsing (sjálfvirkt)'] || o['Innihaldslýsing  (sjálfvirkt)'] || o['Innihaldslýsing'] || '';
    o['Ofnæmisvaldar']          = o['Ofnæmisvaldar (sjálfvirkt)'] || o['Ofnæmisvaldar  (sjálfvirkt)'] || o['Ofnæmisvaldar'] || '';
    o['Fyrirvari']              = o['Fyrirvari (sjálfvirkt)'] || o['Fyrirvari  (sjálfvirkt)'] || o['Fyrirvari'] || '';
    return o;
  }

  for(var r=hidx+1;r<rows.length;r++){
    var arr = rows[r];
    if(!arr || !arr.some(function(v){return cl(v)!=='';})) continue;

    var o = objFromRow(arr);
    // Dagsetning — serial number eða textasnið
    var rawDate = arr[0]; // dálkur A = Dagsetning
    var d = parseDate(rawDate);
    var meal  = cl(o['Máltíðartegund']);
    var type  = cl(o['Tegund']);
    var gildir = cl(o['Gildir fyrir']);
    var display = cl(o['Birtingarnafn']);

    // Uppfæra carry-forward gildi
    if(d) { currentDate = d; }
    if(meal) currentMeal = meal;
    if(gildir) currentGildir = gildir;

    if(!currentDate || !currentMeal) continue;

    var isVaraLine = nm(type)==='vara' || nm(type)==='rettur' || nm(type)==='réttur';
    var isHeiti = !isVaraLine; // allt annað er heitislína

    if(isHeiti) {
      // Heitislína — búa til group
      var gid = 'xl_' + (autoId++);
      o['Group ID'] = gid;
      o._d = currentDate;
      o['Dagsetning'] = currentDate;
      o['Máltíðartegund'] = currentMeal;
      o['Gildir fyrir'] = gildir || currentGildir;
      o['Tegund'] = '';
      currentGroup = gid;
      out.push(o);
    } else {
      // Varulína — tengja við group og setja _d
      if(!currentGroup) continue;
      o['Group ID'] = currentGroup;
      o._d = currentDate; // LYKILBREYTING: setja _d á varulínur líka
      o['Dagsetning'] = currentDate;
      o['Máltíðartegund'] = currentMeal;
      o['Gildir fyrir'] = gildir || currentGildir;
      o['Tegund'] = type;
      out.push(o);
    }
  }
  return out;
}

var CKEY='mt_excel_cache_v2';
function saveCache(){try{localStorage.setItem(CKEY,JSON.stringify({ts:Date.now(),m:mRows,r:rbRows,v:vsRows}));}catch(e){}}
function loadCache(){try{return JSON.parse(localStorage.getItem(CKEY)||'null');}catch(e){return null;}}

function loadAll() {
  return fetch(EXCEL_URL, {cache:'no-store'}).then(function(r){
    if(!r.ok) throw new Error('Excel skrá fannst ekki: '+r.status);
    return r.arrayBuffer();
  }).then(function(buf){
    var wb = XLSX.read(buf, {type:'array', cellDates:false});
    mRows = parseMenuRows(sheetRows(wb,'Grunnmatseðill'));
    rbRows = normalizeRecipeRows(makeObjects(sheetRows(wb,'Réttabanki'), 'Heiti réttar'));
    vsRows = normalizeProductRows(makeObjects(sheetRows(wb,'Vöruskrá'), 'Heiti vöru'));
    saveCache();
  });
}

function loadSafe(){
  return loadAll().catch(function(err){
    var c=loadCache();
    if(c){mRows=c.m||[];rbRows=c.r||[];vsRows=c.v||[];return;}
    throw err;
  });
}

function parseDate(s) {
  if(typeof s === 'number') return excelSerialToDate(s);
  if(!s) return null;
  var t = s.toString().trim();
  // DD/MM/YY (t.d. 05/05/26)
  var m = t.match(/^(\d{2})\/(\d{2})\/(\d{2})$/);
  if(m){
    var yr=+m[3]+2000;
    var d=new Date(yr,+m[2]-1,+m[1]); d.setHours(0,0,0,0); return d;
  }
  // DD/MM/YYYY (t.d. 13/05/2026) — íslenskt snið (þvingað í Sheets)
  m = t.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(m){
    var d2=new Date(+m[3],+m[2]-1,+m[1]); d2.setHours(0,0,0,0); return d2;
  }
  // D/M/YYYY eða M/D/YYYY með 1-2 stafa dag/mánuð — giska á íslenskt snið
  m = t.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    var day=+m[1], mon=+m[2], yr2=+m[3];
    // Ef dagur > 12 er það örugglega D/M/YYYY
    // Ef mánuður > 12 er það örugglega M/D/YYYY
    // Annars: giska á D/M/YYYY (íslenska)
    if(day > 12){
      var d3=new Date(yr2,mon-1,day); d3.setHours(0,0,0,0); return d3;
    } else if(mon > 12){
      var d4=new Date(yr2,day-1,mon); d4.setHours(0,0,0,0); return d4;
    } else {
      var d5=new Date(yr2,mon-1,day); d5.setHours(0,0,0,0); return d5;
    }
  }
  // ISO yyyy-mm-dd
  m = t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if(m){var d6=new Date(+m[1],+m[2]-1,+m[3]);d6.setHours(0,0,0,0);return d6;}
  return null;
}

function isoWeek(d) {
  var dt=new Date(d);dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate()+3-((dt.getDay()+6)%7));
  var w1=new Date(dt.getFullYear(),0,4);
  return 1+Math.round(((dt-w1)/86400000-3+((w1.getDay()+6)%7))/7);
}

function mondayOfWeek(d) {
  var x = new Date(d);
  x.setHours(0,0,0,0);
  var day = x.getDay(); // 0=sunnudagur
  var diff = (day + 6) % 7; // mánudagur = 0
  x.setDate(x.getDate() - diff);
  return x;
}

function addDays(d, days) {
  var x = new Date(d);
  x.setDate(x.getDate() + days);
  x.setHours(0,0,0,0);
  return x;
}

function weekRange(offset) {
  var start = mondayOfWeek(new Date());
  start = addDays(start, offset * 7);
  var end = addDays(start, 5); // föstudagur, inclusive
  return {start:start,end:end};
}

function inWeekRange(date, offset) {
  if(!date) return false;
  var wr = weekRange(offset);
  var d = new Date(date);
  d.setHours(0,0,0,0);
  return d >= wr.start && d <= wr.end;
}

function visWeeks() {
  var r = {};
  [0,1].forEach(function(off){
    var wr = weekRange(off);
    r[wr.start.getTime()] = wr;
  });
  return r;
}

function weekLabel(offset) {

function fmtDate(d) {

function gCol(row,key) {
  if(row[key]!==undefined) return cl(row[key]);
  // Reyna með normaliserðu heiti (fjarlægja línubil)
  var cleanKey = key.replace(/\n/g,' ').replace(/\s+/g,' ').trim();
  if(row[cleanKey]!==undefined) return cl(row[cleanKey]);
  var nk=nm(cleanKey);
  var keys=Object.keys(row);
  for(var i=0;i<keys.length;i++){
    var ck=keys[i].replace(/\n/g,' ').replace(/\s+/g,' ').trim();
    if(nm(ck)===nk||nm(ck).indexOf(nk)>=0||nk.indexOf(nm(ck))>=0) return cl(row[keys[i]]);
  }
  return '';
}

  var idx = name.lastIndexOf(' – ');
  if(idx === -1) idx = name.lastIndexOf(' - ');

}

function nutVal(vara,key){
  // Reyna beint
  if(vara[key]!==undefined){var v=(vara[key]||'').toString().replace(',','.');var n=parseFloat(v);if(!isNaN(n))return n;}
  // Leita með normalisering (fjarlægja línubil og bil)
  var nk=key.replace(/\s+/g,' ').toLowerCase();
  var keys=Object.keys(vara);
  for(var i=0;i<keys.length;i++){
    var vk=keys[i].replace(/\s+/g,' ').replace(/\n/g,' ').toLowerCase();
    if(vk===nk||vk.replace(/\s/g,'')===nk.replace(/\s/g,'')){
      var v2=(vara[keys[i]]||'').toString().replace(',','.');
      var n2=parseFloat(v2);
      if(!isNaN(n2))return n2;
    }
  }
  return null;
}

function calcNut(ings,portion){
  var tot=ings.reduce(function(s,v){return s+(v.magn||0);},0);
  if(tot<=0) return null;
  var p100={},pPor={};
  NK.forEach(function(k){
    var s=0,has=false;
    ings.forEach(function(v){if(!v.vara)return;var x=nutVal(v.vara,k);if(x!==null){s+=x*(v.magn/tot);has=true;}});
    p100[k]=has?Math.round(s*10)/10:null;
    pPor[k]=(portion>0&&p100[k]!==null)?Math.round(p100[k]*portion/100*10)/10:null;
  });
  return{p100:p100,pPor:pPor,portion:portion};
}

function calcNutVara(vara,portion){
  var p100={},pPor={};
  NK.forEach(function(k){
    p100[k]=nutVal(vara,k);
    pPor[k]=(portion>0&&p100[k]!==null)?Math.round(p100[k]*portion/100*10)/10:null;
  });
  return{p100:p100,pPor:pPor,portion:portion};
}

function nutTable(nd){
  if(!nd||!NK.some(function(k){return nd.p100[k]!==null;})) return '<div class="nonut">Engin næringargildi skráð.</div>';

}

function boldify(txt) {
  // Umbreyta **texti** í <strong>texti</strong>
  // Keyrum á hráum texta (ekki escaped) og escum hlutana
  if(!txt) return '';
  var result = '';
  var parts = txt.split(/\*\*([^*]+)\*\*/);
  // parts: [text, bold, text, bold, ...]
  for(var i=0; i<parts.length; i++){
    if(i%2===0){
      result += esc(parts[i]);
    } else {
      result += '<strong>' + esc(parts[i]) + '</strong>';
    }
  }
  return result;
}

function parseIngredients(txt, allergens) {
  if(!txt) return '';

  // 1. Skipta á kommu utan sviga
  function splitOuter(s) {
    var parts=[], cur='', depth=0;
    for(var i=0;i<s.length;i++){
      var ch=s[i];
      if(ch==='(') depth++;
      else if(ch===')') depth--;
      else if(ch===',' && depth===0){ parts.push(cur.trim()); cur=''; continue; }
      cur+=ch;
    }
    if(cur.trim()) parts.push(cur.trim());
    return parts;
  }

  // 2. Þátta hvert innihaldsefni
  var parts = splitOuter(txt);
  var html = '';
  parts.forEach(function(item, idx){
    if(idx > 0) html += ', ';
    // Athuga hvort efnið hafi undirinnihald: "nafn (undirinnihald)"
    // en ekki bara hlutfall eins og "Nautakjöt (26%)"
    var m = item.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
    if(m){
      var name = m[1].trim();
      var sub  = m[2].trim();
      // Ef sub er bara tala/prósent - ekki gera hlekk
      if(/^\d+[%g]?$/.test(sub)){
        html += boldify(name) + esc(' ('+sub+')');
      } else {
        // Feitletra yfirheiti ef undirinnihald inniheldur **
        var subDisplay = sub;
        var nameIsBold = (sub.indexOf('**') !== -1);
        var displayName = nameIsBold ? '**' + name + '**' : name;
        var safeStr = subDisplay.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        html += '<span class="ing-link"' +
          ' onmouseenter="showIngTip(event,\'' + safeStr + '\')"' +
          ' onmouseleave="hideIngTip()"' +
          ' onclick="showIngTip(event,\'' + safeStr + '\')">' +
          '\uD83D\uDD0D ' + boldify(displayName) + '</span>';
      }
    } else {
      html += boldify(item);
    }
  });
  return html;
}

function groupRows(allRows, skoli, dayK, weekOffset) {
  if(weekOffset===undefined) weekOffset = currentWeekOffset || 0;
  var skoliIS = skoli==='Leikskoli' ? 'Leikskóli' : 'Grunnskóli';

  var mainLines = allRows.filter(function(r){

    if(!r._d) return false;
    if(!inWeekRange(r._d, weekOffset)) return false;
    if(dayKey(r._d) !== dayK) return false;
    var g = cl(gCol(r,'Gildir fyrir'));
    return g==='Bæði'||nm(g)===nm(skoliIS);
  });

  // Ávaxtastund Group ID 1 er grunnlína sem á alltaf að sjást.
  // Hún getur verið efst í skjalinu og ekki endurtekin fyrir hvern dag.
  var hasFruit = mainLines.some(function(r){ return isFruitDefaultRow(r); });
  if(!hasFruit){
    var fruitMain = allRows.find(function(r){
      if(!r._d) return false;
      if(!isFruitDefaultRow(r)) return false;
      var g = cl(gCol(r,'Gildir fyrir'));
      return g==='Bæði'||nm(g)===nm(skoliIS);
    });
    if(fruitMain){
      var fruitCopy = Object.assign({}, fruitMain);
      var wr = weekRange(weekOffset);
      var target = addDays(wr.start, ['Man','Tri','Mid','Fim','Fos'].indexOf(dayK));
      fruitCopy._d = target;
      fruitCopy['Dagsetning'] = target;
      mainLines.unshift(fruitCopy);
    }
  }

  var varaLines = allRows.filter(function(r){
    var gid = cl(r['Group ID']||r['GroupID']||'');
    var type = nm(cl(r['Tegund']||''));
    return gid !== '' && (type==='vara' || type==='rettur' || type==='réttur');
  });

  var groups = {};
  mainLines.forEach(function(main){
    var gid = cl(main['Group ID']||main['GroupID']||'');
    if(!gid) return;
    groups[groupKey(main)] = { main: main, varar: [] };
  });

  varaLines.forEach(function(vara){
    var key = groupKey(vara);
    if(groups[key]) groups[key].varar.push(vara);
  });

  return { mainLines: mainLines, groups: groups };
}

function renderMenu(){
  window._varaGroups = {};
  var el=document.getElementById('menuArea');
  if(!currentSkoli||!currentDay){el.innerHTML='';return;}

  var skk=currentSkoli==='Leikskoli'?'Skammtur Leikskóli (g)':'Skammtur Grunnskóli (g)';
  var result=groupRows(mRows,currentSkoli,currentDay,currentWeekOffset);
  var mainLines=result.mainLines;
  var groups=result.groups;

  if(!mainLines.length){
    var wr=weekRange(currentWeekOffset);
    var target=addDays(wr.start,['Man','Tri','Mid','Fim','Fos'].indexOf(currentDay));
    var dayHtmlEmpty='<div class="dayhead"><h1 class="daytitle">'+esc(DNAME[currentDay]||currentDay)+'</h1>'+(target?'<span class="datestr">('+esc(fmtDate(target))+')</span>':'')+'</div>';
    el.innerHTML=dayHtmlEmpty+fruitSectionHtml()+'<p style="text-align:center;padding:20px;color:#888">Engar skráðar máltíðir þennan dag.</p>';
    document.getElementById('clickHint').style.display='none';
    return;
  }

  var dt=mainLines[0]._d;
  var dayHtml='<div class="dayhead"><h1 class="daytitle">'+esc(DNAME[currentDay]||currentDay)+'</h1>'+(dt?'<span class="datestr">('+esc(fmtDate(dt))+')</span>':'')+'</div>';

  function buildGroup(tegund){
    var lines=mainLines.filter(function(r){return nm(gCol(r,'Máltíðartegund'))===nm(tegund);});
    if(!lines.length) return '';
    return lines.map(function(main){
      var gid=cl(main['Group ID']||main['GroupID']||'');
      var dn=dispName(main);
      var ln=lookupName(main);
      var varar=gid&&groups[groupKey(main)]?groups[groupKey(main)].varar:[];

      if(!varar.length){
        if(!dn) return '';
        return '<div class="dish-group"><div class="dish-name">'+esc(dn)+'</div></div>';
      }

      var varaHtml=varar.map(function(v){
        var vdn=dispName(v)||lookupName(v);
        var vPortion=portionVal(v,skk);
        return '<div class="vara-item">'+esc(vdn)+(vPortion?' <span class="vara-g">('+vPortion+'g)</span>':'')+'</div>';
      }).join('');

      var varaKey = 'vg_' + safeKeyPart(gid) + '_' + safeKeyPart(gCol(main,'Máltíðartegund')) + '_' + safeKeyPart(ln || dn);
      window._varaGroups = window._varaGroups || {};
      window._varaGroups[varaKey] = varar.map(function(v){return {n:lookupName(v),m:portionVal(v,skk)};});
      var titleForModal = dn || ln;
      var nameHtml='<span class="clickable" onclick="showInfoGroupKey(\'' + titleForModal.replace(/\\/g,'\\\\').replace(/'/g,'\\x27') + '\',\'' + varaKey.replace(/'/g,'\\x27') + '\')">'+esc(dn)+'</span>';

      return '<div class="dish-group"><div class="dish-name">'+nameHtml+'</div><div class="vara-list">'+varaHtml+'</div></div>';
    }).join('');
  }

  var avHtml='';
  var adalHtml=buildGroup('Aðalréttur');
  var hlidarHtml=buildGroup('Hliðarréttur');
  var medHtml=buildGroup('Meðlæti');
  var sidHtml=buildGroup('Síðdegishressing');

  var fh=fruitSectionHtml();

  var hadHtml='';
  if(adalHtml||hlidarHtml||medHtml){
    hadHtml='<section class="band"><h3 class="bandtitle"><img src="'+ICON+'" alt="">Hádegismatur</h3>';
    if(adalHtml) hadHtml+='<div class="lbl">Aðalréttur</div>'+adalHtml;
    if(hlidarHtml) hadHtml+='<div class="lbl">Hliðarréttur</div>'+hlidarHtml;
    if(medHtml) hadHtml+='<div class="lbl">Meðlæti</div>'+medHtml;
    hadHtml+='</section>';
  }
  var sidSection=sidHtml?'<section class="band"><h3 class="bandtitle"><img src="'+ICON+'" alt="">Síðdegisstund</h3>'+sidHtml+'</section>':'';

  el.innerHTML=dayHtml+fh+hadHtml+sidSection;
  document.getElementById('clickHint').style.display='flex';
}

function selectSkoli(sk){
  currentSkoli=sk;
  document.getElementById('btnLeik').classList.toggle('active',sk==='Leikskoli');
  document.getElementById('btnGrun').classList.toggle('active',sk==='Grunnskoli');
  document.getElementById('dayNav').style.display='flex';
  document.getElementById('menuArea').innerHTML='<div class="loading">Hleður matseðli...</div>';
  loadSafe().then(function(){
    currentWeekOffset = currentWeekOffset || 0;
    updateWeekSelectLabels();
    var t=new Date();
    var dk=dayKey(t)||'Man';
    selectDay(dk);
  }).catch(function(err){
    document.getElementById('menuArea').innerHTML='<div class="loading">Náði ekki að lesa Excel skjalið úr SharePoint.<br><small>'+esc(err.message||err)+'</small></div>';
  });
  if(!window._rt)window._rt=setInterval(function(){
    if(!currentSkoli)return;
    loadAll().then(function(){
      updateWeekSelectLabels();
      renderMenu();
    }).catch(function(){});
  },300000);
}

  if(!currentSkoli||!mRows.length){alert('Veldu fyrst leikskola eda grunnskola.');return;}
  var vr=filteredRows(currentSkoli,currentWeekOffset);
  var days=['Man','Tri','Mid','Fim','Fos'];
  var html='<h2 style="color:#39552c;text-align:center;margin-bottom:20px">MATSEÐILL - '+weekLabel(currentWeekOffset).toUpperCase()+'</h2>';

    html+='<h3 style="color:#ff7d39">'+DNAME[dk].toUpperCase()+' ('+esc(fmtDate(dr[0]._d))+')</h3><p><strong>Ávaxtastund:</strong> Ferskir ávextir alla daga</p><p><strong>Aðalréttur:</strong> '+gn('Aðalréttur')+'</p><p><strong>Hliðarréttur:</strong> '+gn('Hliðarréttur')+'</p><p><strong>Meðlæti:</strong> '+gn('Meðlæti')+'</p><p><strong>Síðdegisstund:</strong> '+gn('Síðdegishressing')+'</p><hr style="margin:16px 0">';
  });
  var wp=document.getElementById('weeklyPrint');wp.innerHTML=html;wp.style.display='block';
  var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
  s.onload=function(){html2canvas(wp).then(function(c){var a=document.createElement('a');a.download='vikumatseðill.jpg';a.href=c.toDataURL('image/jpeg',1.0);a.click();wp.style.display='none';});};
  if(window.html2canvas){html2canvas(wp).then(function(c){var a=document.createElement('a');a.download='vikumatseðill.jpg';a.href=c.toDataURL('image/jpeg',1.0);a.click();wp.style.display='none';});}
  else{document.head.appendChild(s);}
}


function showIngTip(evt, txt) {
  var tip = document.getElementById('ing-tooltip');
  // Styðja **bold** í tooltip
  var parts = txt.split(/\*\*([^*]+)\*\*/);
  var html = '';
  for(var i=0;i<parts.length;i++){
    if(i%2===0) html += esc(parts[i]);
    else html += '<strong>'+esc(parts[i])+'</strong>';
  }
  tip.innerHTML = html;
  tip.style.display = 'block';
  var x = evt.clientX + 12;
  var y = evt.clientY - 10;
  // Make sure tooltip stays within viewport
  var tw = tip.offsetWidth || 300;
  var th = tip.offsetHeight || 60;
  if(x + tw > window.innerWidth - 10) x = evt.clientX - tw - 12;
  if(y + th > window.innerHeight - 10) y = evt.clientY - th - 10;
  if(y < 10) y = 10;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
function hideIngTip() {
  var tip = document.getElementById('ing-tooltip');
  if(tip) tip.style.display = 'none';
}

  document.getElementById('infoModal').addEventListener('click',function(e){if(e.target===document.getElementById('infoModal'))closeModal();});
  currentWeekOffset = 0;
  updateWeekSelectLabels();
  selectSkoli('Leikskoli');
  document.addEventListener('click',function(e){
    var dd=document.getElementById('weekDropdown');
    if(dd && !dd.contains(e.target)) closeWeekMenu();
  });
});

<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Bodoni+Moda:opsz,wght@6..96,700&display=swap" rel="stylesheet">
<style>
:root { --red: #D81E30; --cream: #FDF8E2; --green: #39552C; --soft: rgba(57,85,44,.06); }
* { box-sizing: border-box; }
body { font-family: Manrope, Arial, sans-serif; background: var(--cream); margin: 0; color: #222; }
body::after { content: ""; position: fixed; right: -80px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; opacity: .16; background: url('https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827') no-repeat center/contain; pointer-events: none; z-index: 0; }

/* HAUS */
.hero { position: relative; z-index: 10; padding: 20px 18px 8px; text-align: center; }
.barn-kort { max-width: 600px; margin: 0 auto 16px; background: var(--green); color: white; border-radius: 20px; padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
.barn-icon { font-size: 40px; }
.barn-info { text-align: left; }
.barn-nafn { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.barn-skoli { font-size: 14px; opacity: .8; }
.barn-ofnaemi { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
.ofn-tag { background: rgba(255,255,255,.2); border-radius: 20px; padding: 3px 10px; font-size: 13px; font-weight: 600; }
.ofn-tag.brada { background: var(--red); }

/* VIKUVAL */
.days { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 8px auto 16px; max-width: 980px; padding: 0 18px; }
.daybtn { background: var(--cream); color: var(--green); border: 2px solid var(--red); border-radius: 18px; padding: 10px 18px; min-width: 130px; font-weight: 700; cursor: pointer; transition: .18s; font-family: inherit; text-align: center; }
.daybtn:hover, .daybtn.active { background: var(--red); color: #fff; }
.weekdropdown { position: relative; display: inline-block; }
.weektrigger { border: 2px solid var(--red); color: var(--red); background: var(--cream); padding: 10px 18px; border-radius: 999px; font-weight: 700; cursor: pointer; transition: .18s; font-family: inherit; min-width: 170px; }
.weektrigger:hover, .weektrigger.open { background: var(--red); color: #fff; }
.weekmenu { display: none; position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); min-width: 310px; background: #fffefc; border: 2px solid var(--red); border-radius: 18px; box-shadow: 0 10px 24px rgba(0,0,0,.18); z-index: 50; overflow: hidden; }
.weekmenu.open { display: block; }
.weekoption { padding: 12px 16px; cursor: pointer; color: var(--green); font-weight: 700; font-family: inherit; background: #fffefc; }
.weekoption:hover { background: #fff3e0; }
.weekoption.active { background: rgba(57,85,44,.08); color: var(--red); }
.weekcheck { display: inline-block; width: 22px; color: var(--red); font-weight: 700; }

/* DAGUR */
.card { max-width: 980px; margin: 0 auto; padding: 0 18px 40px; position: relative; z-index: 1; }
.dayhead { display: flex; gap: 10px; align-items: baseline; justify-content: center; margin: 8px 0 14px; }
.daytitle { font-family: "Bodoni Moda", serif; color: var(--red); font-size: 56px; margin: 0; text-transform: uppercase; }
.datestr { color: var(--red); font-weight: 600; font-size: 18px; }

/* BAND */
.band { background: var(--soft); padding: 20px; border: 2px solid var(--red); border-radius: 24px; margin: 14px 0; }
.bandtitle { display: flex; align-items: center; gap: 10px; color: var(--red); font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin: 0 0 10px; }
.bandtitle img { width: 20px; height: 20px; }
.lbl { font-weight: 500; font-size: 14px; color: #111; margin: 8px 0 4px; }

/* FÆR RÉTTUR */
.faer-band { padding: 20px; border-radius: 24px; margin: 14px 0; border: 2px solid; }
.faer-band.adal { background: #E8F5E9; border-color: #2E7D32; }
.faer-band.hlidar { background: #E3F2FD; border-color: #1565C0; }
.faer-band.ofnaemis { background: #FFF3E0; border-color: #E65100; }
.faer-band.enginn { background: #FFEBEE; border-color: var(--red); }
.faer-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.faer-band.adal .faer-title { color: #2E7D32; }
.faer-band.hlidar .faer-title { color: #1565C0; }
.faer-band.ofnaemis .faer-title { color: #E65100; }
.faer-band.enginn .faer-title { color: var(--red); }
.faer-aths { font-size: 14px; color: #555; margin-top: 4px; }

/* RÉTTUR */
.dish-group { margin-bottom: 10px; }
.dish-name { font-size: 18px; font-weight: 700; color: var(--green); }
.vara-list { margin-top: 3px; padding-left: 8px; }
.vara-item { font-size: 14px; color: #555; display: inline; }
.vara-item::after { content: ", "; }
.vara-item:last-child::after { content: ""; }
.vara-g { color: #aaa; font-weight: 400; font-size: 12px; }

/* MODAL */
.clickable { cursor: pointer; color: var(--green); font-weight: 700; padding: 2px 4px; border-radius: 8px; text-decoration: underline; text-decoration-style: dotted; }
.clickable::before { content: ""; display: inline-block; width: 20px; height: 20px; margin-right: 6px; border-radius: 999px; border: 1px solid currentColor; background: url('https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827') no-repeat center/contain; vertical-align: middle; }
.clickable:hover { background: #e9f3ea; }
.hint { max-width: 980px; margin: 0 auto 8px; padding: 0 18px; font-size: 14px; color: #39552C; display: flex; align-items: center; gap: 6px; }
.modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.5); align-items: center; justify-content: center; padding: 16px; }
.modal.open { display: flex; }
.modalbox { background: #fffefc; position: relative; padding: 28px 30px 30px; width: 92%; max-width: 860px; max-height: 88vh; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,.3); display: flex; flex-direction: column; border: 2px solid var(--red); border-radius: 24px; }
.modalscroll { flex: 0 1 auto; overflow-y: auto; padding-right: 12px; margin-top: 8px; max-height: calc(88vh - 70px); }
.closebtn { position: absolute; top: 16px; right: 20px; font-size: 22px; cursor: pointer; color: #aaa; background: none; border: none; font-family: inherit; }
.modaltitle { color: var(--green); font-size: 26px; font-weight: 700; margin: 0 0 20px; }
.modalsub { color: var(--green); font-size: 18px; margin: 20px 0 10px; font-weight: 700; }
.varabox { background: #fff8f1; border-left: 5px solid #FF7D39; padding: 16px; border-radius: 12px; margin-bottom: 14px; }
.varanafn { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.varainn { font-size: 14px; margin-bottom: 6px; line-height: 1.6; }
.varaofn { font-size: 14px; color: #C0392B; font-weight: 600; }
.nutable { width: 100%; border-collapse: collapse; margin-top: 16px; }
.nutable th, .nutable td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 15px; }
.nutable th { background: var(--green); color: #fff; text-transform: uppercase; letter-spacing: .5px; font-size: 13px; }
.nutable tr:nth-child(even) td { background: #f9f9f9; }
.nonut { background: #fff6f6; border-left: 4px solid #e0e0e0; padding: 12px 16px; border-radius: 8px; color: #888; font-size: 14px; margin-top: 12px; }
.loading { text-align: center; padding: 60px 20px; color: #888; font-size: 18px; }
.not-found { text-align: center; padding: 60px 20px; }
.not-found h2 { color: var(--red); font-size: 24px; margin-bottom: 12px; }
.fruitlead { font-size: 18px; font-weight: 700; color: var(--green); }
.fruittext { font-size: 15px; color: #333; margin-top: 4px; }

@media (max-width: 480px) {
  .daytitle { font-size: 26px; }
  .barn-nafn { font-size: 18px; }
  .daybtn { min-width: 0; padding: 8px 12px; font-size: 13px; }
  .days { gap: 8px; }
}
</style>
</head>
<body>

<header class="hero">
  <div id="barnKort" style="display:none" class="barn-kort">
    <div class="barn-icon">👤</div>
    <div class="barn-info">
      <div class="barn-nafn" id="barnNafn">...</div>
      <div class="barn-skoli" id="barnSkoli">...</div>
      <div class="barn-ofnaemi" id="barnOfnaemi"></div>
    </div>
  </div>
  <div style="display:flex;gap:10px;justify-content:center;margin-bottom:8px;flex-wrap:wrap">
    <div class="weekdropdown">
      <button id="weekTrigger" class="weektrigger" onclick="toggleWeekMenu()">📅 Þessi vika ▼</button>
      <div id="weekMenu" class="weekmenu">
        <div id="weekOpt0" class="weekoption" onclick="selectWeekFromMenu(0)"></div>
        <div id="weekOpt1" class="weekoption" onclick="selectWeekFromMenu(1)"></div>
      </div>
    </div>
  </div>
</header>

<nav class="days" id="dayNav" style="display:none">
  <button class="daybtn" onclick="selectDay('Man')">Mánudagur</button>
  <button class="daybtn" onclick="selectDay('Tri')">Þriðjudagur</button>
  <button class="daybtn" onclick="selectDay('Mid')">Miðvikudagur</button>
  <button class="daybtn" onclick="selectDay('Fim')">Fimmtudagur</button>
  <button class="daybtn" onclick="selectDay('Fos')">Föstudagur</button>
</nav>

<main class="card" id="mainArea">
  <div class="loading">Hleður...</div>
</main>

<p class="hint" id="clickHint" style="display:none">
  <span style="display:inline-block;width:20px;height:20px;border-radius:999px;border:1px solid currentColor;background:url('https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827') no-repeat center/contain;"></span>
  Smelltu á rétt til að sjá innihaldslýsingu og næringargildi.
</p>

<div id="infoModal" class="modal">
  <div class="modalbox">
    <button class="closebtn" onclick="closeModal()">✕</button>
    <div id="modalContent" class="modalscroll"></div>
  </div>
</div>

<script>
var EXCEL_URL = 'https://johnbond87.github.io/matarstund/Matarstund_v12.xlsx';
var ICON = 'https://cdn.shopify.com/s/files/1/0707/1458/9322/files/Matarstund_Icon_green_orange.svg?v=1754057827';
var MONTHS = ['januar','februar','mars','april','mai','juni','juli','agust','september','oktober','november','desember'];
var DNAME = { Man:'Mánudagur', Tri:'Þriðjudagur', Mid:'Miðvikudagur', Fim:'Fimmtudagur', Fos:'Föstudagur' };

var currentDay = '', currentWeekOffset = 0;
var mRows = [], vsMap = {}, rbMap = {};
var barnData = null; // { nafn, skoli, deild, ofnaemi, athugasemd, ofnaemisrettur, tegund }
var barnId = '';

// ═══ HJÁLPARFÖLL ═══
function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nm(s){ return (s||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function cl(s){ return (s===null||s===undefined)?'':s.toString().trim(); }
function boldify(txt){
  if(!txt) return '';
  var parts=txt.split(/\*\*([^*]+)\*\*/) ,r='';
  for(var i=0;i<parts.length;i++) r+=i%2===0?esc(parts[i]):'<strong>'+esc(parts[i])+'</strong>';
  return r;
}

function excelSerialToDate(n){
  if(typeof n!=='number'||!isFinite(n)) return null;
  var d=new Date(1899,11,30); d.setDate(d.getDate()+Math.floor(n)); d.setHours(0,0,0,0); return d;
}
function parseDate(s){
  if(typeof s==='number') return excelSerialToDate(s);
  if(!s) return null;
  var t=s.toString().trim(), m;
  m=t.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){var d=new Date(+m[3],+m[2]-1,+m[1]);d.setHours(0,0,0,0);return d;}
  m=t.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m){var d2=new Date(+m[1],+m[2]-1,+m[3]);d2.setHours(0,0,0,0);return d2;}
  return null;
}
function mondayOfWeek(d){var x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-(x.getDay()+6)%7);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);x.setHours(0,0,0,0);return x;}
function weekRange(off){var s=addDays(mondayOfWeek(new Date()),off*7);return{start:s,end:addDays(s,5)};}
function inWeekRange(date,off){if(!date)return false;var wr=weekRange(off),d=new Date(date);d.setHours(0,0,0,0);return d>=wr.start&&d<=wr.end;}
function weekLabel(off){var wr=weekRange(off);return(off===0?'Þessi vika':'Næsta vika')+' ('+fmtDate(wr.start)+' - '+fmtDate(wr.end)+')';}
function dayKey(date){var d=date.getDay();return d===1?'Man':d===2?'Tri':d===3?'Mid':d===4?'Fim':d===5?'Fos':null;}
function fmtDate(d){return d.getDate()+'. '+MONTHS[d.getMonth()]+' '+d.getFullYear();}

// ═══ VIKUVAL ═══
function updateWeekLabels(){
  var t=document.getElementById('weekTrigger'),o0=document.getElementById('weekOpt0'),o1=document.getElementById('weekOpt1');
  if(t) t.textContent='📅 '+(currentWeekOffset===0?'Þessi vika':'Næsta vika')+' ▼';
  if(o0){o0.innerHTML='<span class="weekcheck">'+(currentWeekOffset===0?'✓':'')+'</span>'+weekLabel(0);o0.classList.toggle('active',currentWeekOffset===0);}
  if(o1){o1.innerHTML='<span class="weekcheck">'+(currentWeekOffset===1?'✓':'')+'</span>'+weekLabel(1);o1.classList.toggle('active',currentWeekOffset===1);}
}
function toggleWeekMenu(){var m=document.getElementById('weekMenu'),t=document.getElementById('weekTrigger');var open=!m.classList.contains('open');m.classList.toggle('open',open);t.classList.toggle('open',open);updateWeekLabels();}
function closeWeekMenu(){document.getElementById('weekMenu').classList.remove('open');document.getElementById('weekTrigger').classList.remove('open');}
function selectWeekFromMenu(off){currentWeekOffset=off;updateWeekLabels();closeWeekMenu();renderDay();}

// ═══ LESTUR Á ID ÚR URL ═══
function getBarnId(){
  var params=new URLSearchParams(window.location.search);
  return params.get('id')||'';
}

// ═══ EXCEL LESTUR ═══
function sheetRows(wb,name){
  var ws=wb.Sheets[name]; if(!ws) return [];
  return XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
}

function findCol(headers, needle) {
  for(var i=0;i<headers.length;i++){
    if(nm(headers[i]).indexOf(nm(needle))>=0) return i;
  }
  return -1;
}

function parseMenuRows(rows){
  var hidx=-1;
  for(var i=0;i<rows.length;i++){
    if(nm(cl(rows[i][0]))==='dagsetning'){hidx=i;break;}
  }
  if(hidx<0) return [];
  var headers=rows[hidx].map(function(h){return cl(h).replace(/\n/g,' ').replace(/\s+/g,' ').trim();});

  function findC(needle){return findCol(headers,needle);}
  var C={
    DATE:0, GILDIR:findC('gildir'), MEAL:findC('máltíðartegund'),
    VARA:findC('vara / réttur'), BIRTING:findC('birtingarnafn'),
    SK_LEIK:(function(){var v=findC('skammtur leikskóli');return v>=0?v:findC('skammtur leikskoli');}()),
    SK_GRUNN:(function(){var v=findC('skammtur grunnskóli');return v>=0?v:findC('skammtur grunnskoli');}()),
    INN:(function(){var v=findC('innihaldslýsing');return v>=0?v:findC('innihaldslysing');}()),
    OFN:(function(){var v=findC('ofnæmisvaldar');return v>=0?v:findC('ofnaemisvaldar');}()),
    FYR:findC('fyrirvari'),
    ORKA:findC('orka'), FITA:findC('fita'),
    METT:(function(){var v=findC('mettuð');return v>=0?v:findC('mettud');}()),
    KOLV:findC('kolvetni'),
    PROT:(function(){var v=findC('prótein');return v>=0?v:findC('protein');}()),
    SALT:findC('salt'),
  };

  function g(arr,c){if(c<0)return'';var v=arr[c];return(v===null||v===undefined||v==='')?'':v.toString().trim();}
  function gn(arr,c){if(c<0)return null;var v=parseFloat(g(arr,c));return isNaN(v)?null:v;}

  var out=[], autoId=1000, curDate=null, curMeal='', curGildir='Bæði', curGid=null;

  for(var r=hidx+1;r<rows.length;r++){
    var arr=rows[r];
    if(!arr||arr.every(function(v){return!v&&v!==0;})) continue;
    var rawDate=arr[C.DATE];
    var d=typeof rawDate==='number'?excelSerialToDate(rawDate):parseDate(rawDate);
    var meal=g(arr,C.MEAL), gildir=g(arr,C.GILDIR), vara=g(arr,C.VARA);
    if(d) curDate=d;
    if(meal) curMeal=meal;
    if(gildir) curGildir=gildir;
    if(!curDate||!curMeal) continue;
    if(!vara){
      var gid='xl_'+(autoId++); curGid=gid;
      out.push({_gid:gid,_d:new Date(curDate),_isMain:true,_meal:curMeal,_gildir:gildir||curGildir,_vara:'',_birting:g(arr,C.BIRTING)});
    } else if(curGid){
      out.push({_gid:curGid,_d:new Date(curDate),_isMain:false,_meal:curMeal,_gildir:gildir||curGildir,
        _vara:vara,_birting:g(arr,C.BIRTING),
        _skLeik:gn(arr,C.SK_LEIK),_skGrunn:gn(arr,C.SK_GRUNN),
        _inn:g(arr,C.INN),_ofn:g(arr,C.OFN),_fyr:g(arr,C.FYR),
        _orka:gn(arr,C.ORKA),_fita:gn(arr,C.FITA),_mett:gn(arr,C.METT),
        _kolv:gn(arr,C.KOLV),_prot:gn(arr,C.PROT),_salt:gn(arr,C.SALT)
      });
    }
  }
  return out;
}

function parseVoruskra(rows){
  var hidx=-1;
  for(var i=0;i<rows.length;i++){
    if(rows[i].some(function(c){return nm(cl(c)).indexOf('heiti')>=0&&nm(cl(c)).indexOf('voru')>=0;})){hidx=i;break;}
  }
  if(hidx<0) return {};
  var headers=rows[hidx].map(function(h){return cl(h).replace(/\n/g,' ').replace(/\s+/g,' ').trim();});
  var map={};
  for(var r=hidx+1;r<rows.length;r++){
    if(!rows[r]||!rows[r][0]) continue;
    var obj={};
    headers.forEach(function(h,c){if(h)obj[h]=rows[r][c];});
    var lnafn='';
    Object.keys(obj).forEach(function(k){
      var nk=nm(k);
      if(nk.indexOf('leitarnafn')>=0) lnafn=cl(obj[k]);
      if(nk.indexOf('innihaldslysing')>=0||nk.indexOf('innihaldslýsing')>=0) obj['_inn']=cl(obj[k]);
      if(nk.indexOf('ofnaemisvaldar')>=0||nk.indexOf('ofnæmisvaldar')>=0) obj['_ofn']=cl(obj[k]);
      if(nk.indexOf('fyrirvari')>=0) obj['_fyr']=cl(obj[k]);
    });
    obj['_orka']=rows[r][9]!==''?parseFloat(rows[r][9])||null:null;
    obj['_fita']=rows[r][10]!==''?parseFloat(rows[r][10])||null:null;
    obj['_mett']=rows[r][11]!==''?parseFloat(rows[r][11])||null:null;
    obj['_kolv']=rows[r][12]!==''?parseFloat(rows[r][12])||null:null;
    obj['_prot']=rows[r][14]!==''?parseFloat(rows[r][14])||null:null;
    obj['_salt']=rows[r][15]!==''?parseFloat(rows[r][15])||null:null;
    if(lnafn) map[nm(lnafn)]=obj;
  }
  return map;
}

function findVora(name){
  return vsMap[nm(name)]||null;
}

// ═══ FINNA BARN Í NEMENDASKRÁ ═══
function findBarn(wb, id){
  var sheets=['Nemendaskrá — Grunnskólar','Nemendaskrá — Leikskólar'];
  var teg=['gs','ls'];
  for(var si=0;si<sheets.length;si++){
    var rows=sheetRows(wb,sheets[si]);
    for(var r=1;r<rows.length;r++){
      var nafn=cl(rows[r][1]);
      if(!nafn) continue;
      // Foreldrahlekkur - skoða hvort id sé í honum
      var hlekkur=cl(rows[r][teg[si]==='gs'?9:7]);
      if(hlekkur&&hlekkur.indexOf(id)>=0){
        if(teg[si]==='gs'){
          return{nafn:nafn,skoli:cl(rows[r][0]),deild:cl(rows[r][2]),
            ofnaemi:cl(rows[r][6]),athugasemd:cl(rows[r][7]),
            ofnaemisrettur:cl(rows[r][8]),tegund:'gs'};
        } else {
          return{nafn:nafn,skoli:cl(rows[r][0]),deild:cl(rows[r][2]),
            ofnaemi:cl(rows[r][4]),athugasemd:cl(rows[r][5]),
            ofnaemisrettur:cl(rows[r][6]),tegund:'ls'};
        }
      }
    }
  }
  return null;
}

// ═══ OFNÆMISGREINING ═══
var SAMSETT={
  'mjólk':['mjólk','laktósi','mjólkurprótein','undanrenna','rjómi','ostur','smjör','skyr','kasein'],
  'laktósi':['laktósi','mjólk','rjómi','undanrenna'],
  'glúten':['glúten','hveiti','bygg','rúgur','hafrar','spelt','hveitimjöl','rúgmjöl'],
  'fiskur':['fiskur','þorskur','ýsa','lúða','lax','steinbítur','karfi'],
  'egg':['egg','eggjarauður','eggjahvíta'],
  'hnetur':['hnetur','kasjúhnetur','valhneður','möndlur'],
  'jarðhnetur':['jarðhnetur','hnetusmjör'],
  'soja':['soja','sojaprótein'],
  'sellerí':['sellerí'],
  'sinnep':['sinnep'],
  'sesam':['sesam','sesamfræ'],
  'kókos':['kókos','kókosmjólk','kókosrjómi'],
  'svínakjöt':['svínakjöt','svín','beikon'],
};
var MATARAEDI=['vegan','vegetarian','grænmetissæta','pescaterian','pescetarian'];
var KJOT=['kjúklingur','kjúklingalæri','kjöt','nauta','lambakjöt','svín','beikon','kjötbollur','lifrarpylsa'];

function heiltOrd(leit,texti){
  if(!leit||!texti) return false;
  var pattern=new RegExp('(?<![a-z])'+nm(leit).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?![a-z])','i');
  return pattern.test(nm(texti));
}

function barnFaerAdal(ofnStr, athStr, varar, skoliT){
  if(!varar||!varar.length) return {faer:true,aths:''};
  var ofnListi=ofnStr?ofnStr.split(',').map(function(o){return o.trim();}).filter(Boolean):[];
  var athListi=athStr?athStr.split(',').map(function(a){return a.trim();}).filter(function(a){return a.length>2;}):[];
  for(var i=0;i<varar.length;i++){
    var v=varar[i];
    if(v._gildir!=='Bæði'&&v._gildir!==skoliT) continue;
    for(var j=0;j<ofnListi.length;j++){
      var ofn=ofnListi[j], ofnN=nm(ofn);
      if(MATARAEDI.indexOf(ofnN)>=0){
        var erKjot=KJOT.some(function(k){return heiltOrd(k,v._inn)||heiltOrd(k,v._vara);});
        if(ofnN==='vegan'){
          if(erKjot) return{faer:false,aths:ofn+' - réttur inniheldur kjöt'};
          if(['mjólk','rjómi','ostur','smjör','skyr','egg'].some(function(m){return heiltOrd(m,v._inn);}))
            return{faer:false,aths:ofn+' - réttur inniheldur mjólkurvörur'};
        } else if(erKjot){
          return{faer:false,aths:ofn+' - réttur inniheldur kjöt'};
        }
        continue;
      }
      var tengd=SAMSETT[ofnN]||[ofn];
      if(v._ofn&&v._ofn!=='Engir skráðir'){
        for(var t=0;t<tengd.length;t++){
          if(heiltOrd(tengd[t],v._ofn)) return{faer:false,aths:ofn+' í ofnæmisvaldalistanum ('+v._birting||v._vara+')'};
        }
      }
      if(v._inn){
        for(var t2=0;t2<tengd.length;t2++){
          if(heiltOrd(tengd[t2],v._inn)) return{faer:false,aths:ofn+' í innihaldi ('+v._birting||v._vara+')'};
        }
      }
    }
    for(var k=0;k<athListi.length;k++){
      if(heiltOrd(athListi[k],v._inn)) return{faer:false,aths:'Athugasemd: "'+athListi[k]+'" í innihaldi'};
    }
  }
  return{faer:true,aths:''};
}

function hvadFaerBarnid(dag){
  if(!barnData) return null;
  var skoliT=barnData.tegund==='ls'?'Leikskóli':'Grunnskóli';
  var off=currentWeekOffset;

  function getVarar(tegund){
    return mRows.filter(function(r){
      if(r._isMain||!r._d||!inWeekRange(r._d,off)) return false;
      if(dayKey(r._d)!==dag) return false;
      return nm(r._meal)===nm(tegund);
    });
  }

  var adalV=getVarar('Aðalréttur');
  var hlidarV=getVarar('Hliðarréttur');

  var adalRes=barnFaerAdal(barnData.ofnaemi,barnData.athugasemd,adalV,skoliT);
  if(adalRes.faer) return{tegund:'adal',faer:'Aðalréttur',aths:''};

  var hlidarRes=barnFaerAdal(barnData.ofnaemi,barnData.athugasemd,hlidarV,skoliT);
  if(hlidarRes.faer&&hlidarV.length) return{tegund:'hlidar',faer:'Hliðarréttur',aths:adalRes.aths};

  if(barnData.ofnaemisrettur) return{tegund:'ofnaemis',faer:barnData.ofnaemisrettur,aths:adalRes.aths};

  return{tegund:'enginn',faer:'Enginn réttur hentar',aths:'Eldhúsið búa til sérrrétt — hafðu samband við skóla'};
}

// ═══ MODAL ═══
function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('infoModal').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('infoModal').classList.remove('open');document.body.style.overflow='';}

function showGroupModal(mainName,gid){
  var varar=mRows.filter(function(r){return r._gid===gid&&!r._isMain;});
  var html='<h2 class="modaltitle">'+esc(mainName)+'</h2>';
  if(!varar.length){html+='<div class="varabox">Engar nánari upplýsingar.</div>';openModal(html);return;}
  html+='<h3 class="modalsub">Innihaldsefni</h3>';
  varar.forEach(function(v){
    var nafn=v._birting||v._vara;if(!nafn)return;
    html+='<div class="varabox"><div class="varanafn">'+esc(nafn)+(v._skLeik?' <span style="font-weight:400;color:#888;font-size:13px">('+v._skLeik+'g)</span>':'')+'</div>';
    if(v._inn&&v._inn!=='Vara finnst ekki') html+='<div class="varainn">'+boldify(v._inn)+'</div>';
    if(v._ofn&&v._ofn!=='Engir skráðir') html+='<div class="varaofn">⚠️ Ofnæmisvaldar: '+esc(v._ofn)+'</div>';
    html+='</div>';
  });
  var NUT=[{k:'_orka',l:'Orka',u:'kcal'},{k:'_fita',l:'Fita',u:'g'},{k:'_mett',l:'Mettuð fita',u:'g'},{k:'_kolv',l:'Kolvetni',u:'g'},{k:'_prot',l:'Prótein',u:'g'},{k:'_salt',l:'Salt',u:'g'}];
  var hasNut=varar.some(function(v){return NUT.some(function(n){return v[n.k]!==null&&v[n.k]!==undefined;});});
  if(hasNut){
    html+='<h3 class="modalsub">Næringargildi (í skammti)</h3>';
    html+='<div style="overflow-x:auto"><table class="nutable"><thead><tr><th>Næringargildi</th><th>Magn</th></tr></thead><tbody>';
    NUT.forEach(function(n){
      var tot=varar.reduce(function(s,v){return v[n.k]!==null&&v[n.k]!==undefined?s+v[n.k]:s;},0);
      var has=varar.some(function(v){return v[n.k]!==null&&v[n.k]!==undefined;});
      html+='<tr><td>'+n.l+'</td><td>'+(has?Math.round(tot*10)/10+' '+n.u:'&mdash;')+'</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  openModal(html);
}

// ═══ RENDER ═══
function dispName(r){return r._birting||r._vara||'';}

function renderDay(){
  var el=document.getElementById('mainArea');
  if(!barnData||!currentDay){el.innerHTML='';return;}

  var faerInfo=hvadFaerBarnid(currentDay);
  var skoliT=barnData.tegund==='ls'?'Leikskóli':'Grunnskóli';
  var off=currentWeekOffset;

  // Dagsetning
  var dagRows=mRows.filter(function(r){return r._isMain&&r._d&&inWeekRange(r._d,off)&&dayKey(r._d)===currentDay;});
  var dt=dagRows.length?dagRows[0]._d:null;

  var html='<div class="dayhead"><h1 class="daytitle">'+esc(DNAME[currentDay])+'</h1>'+(dt?'<span class="datestr">('+esc(fmtDate(dt))+')</span>':'')+'</div>';

  // Hvað fær barnið þennan dag
  if(faerInfo){
    var bandClass=faerInfo.tegund;
    var icon=faerInfo.tegund==='adal'?'✅':faerInfo.tegund==='hlidar'?'🔵':faerInfo.tegund==='ofnaemis'?'🟠':'🔴';
    html+='<div class="faer-band '+bandClass+'">';
    html+='<div class="faer-title">'+icon+' '+esc(faerInfo.faer)+'</div>';
    if(faerInfo.aths) html+='<div class="faer-aths">'+esc(faerInfo.aths)+'</div>';
    html+='</div>';
  }

  // Sýna réttinn sem barnið fær
  var faerMeal=faerInfo?faerInfo.faer:'Aðalréttur';
  var meals=faerInfo&&faerInfo.tegund==='adal'?['Aðalréttur']:
            faerInfo&&faerInfo.tegund==='hlidar'?['Hliðarréttur']:
            faerInfo&&faerInfo.tegund==='ofnaemis'?[faerInfo.faer]:
            ['Aðalréttur'];

  // Fá allar máltíðartegundir þennan dag
  var allMeals=['Ávaxtastund','Aðalréttur','Hliðarréttur','Meðlæti','Meðlætisbar','Síðdegishressing'];
  // Sýna bara þær sem eru í matseðlinum og hentar barninu
  var mealsSyndar;
  if(faerInfo&&faerInfo.tegund==='adal'){
    mealsSyndar=['Ávaxtastund','Aðalréttur','Meðlæti','Meðlætisbar','Síðdegishressing'];
  } else if(faerInfo&&faerInfo.tegund==='hlidar'){
    mealsSyndar=['Ávaxtastund','Hliðarréttur','Meðlæti','Meðlætisbar','Síðdegishressing'];
  } else {
    mealsSyndar=['Ávaxtastund',faerInfo?faerInfo.faer:'Aðalréttur','Meðlæti','Meðlætisbar','Síðdegishressing'];
  }

  var skKey=barnData.tegund==='ls'?'_skLeik':'_skGrunn';
  var hasContent=false;

  mealsSyndar.forEach(function(tegund){
    var main=mRows.filter(function(r){
      if(!r._isMain||!r._d||!inWeekRange(r._d,off)) return false;
      if(dayKey(r._d)!==currentDay) return false;
      if(nm(r._meal)!==nm(tegund)) return false;
      return r._gildir==='Bæði'||nm(r._gildir)===nm(skoliT);
    });
    if(!main.length) return;

    var gids={};
    main.forEach(function(r){gids[r._gid]=true;});
    var varar=mRows.filter(function(r){return !r._isMain&&gids[r._gid];});

    var mealHtml='';
    main.forEach(function(m){
      var dn=dispName(m),gid=m._gid;
      var vl=varar.filter(function(v){return v._gid===gid;});
      if(vl.length){
        var varaHtml=vl.map(function(v){
          var vdn=dispName(v),sk=v[skKey];
          return '<div class="vara-item">'+esc(vdn)+(sk?' <span class="vara-g">('+sk+'g)</span>':'')+'</div>';
        }).join('');
        var safeName=(dn||'').replace(/\\/g,'\\\\').replace(/'/g,'\\x27');
        mealHtml+='<div class="dish-group"><div class="dish-name"><span class="clickable" onclick="showGroupModal(\''+safeName+'\',\''+gid+'\')">'+esc(dn)+'</span></div><div class="vara-list">'+varaHtml+'</div></div>';
      } else if(dn) {
        mealHtml+='<div class="dish-group"><div class="dish-name">'+esc(dn)+'</div></div>';
      }
    });

    if(!mealHtml) return;
    hasContent=true;

    var icon=nm(tegund)==='ávaxtastund'?'🍎':nm(tegund)==='síðdegishressing'?'🧃':nm(tegund).indexOf('meðlæti')>=0?'🥗':'🍽️';
    var bandTitle=nm(tegund)==='ávaxtastund'?'Ávaxtastund':
                  nm(tegund)==='síðdegishressing'?'Síðdegisstund':
                  nm(tegund).indexOf('meðlætisbar')>=0?'Meðlætisbar':
                  nm(tegund).indexOf('meðlæti')>=0?'Meðlæti':tegund;

    html+='<section class="band"><h3 class="bandtitle"><img src="'+ICON+'" alt="">'+esc(bandTitle)+'</h3>';
    if(nm(tegund)==='ávaxtastund'){
      html+='<div class="fruitlead"><span class="clickable" onclick="showFruitInfo()">Ferskir ávextir alla daga</span></div>';
      html+='<div class="fruittext">Val á ávöxtum getur verið mismunandi milli daga og skóla.</div>';
    } else {
      html+=mealHtml;
    }
    html+='</section>';
  });

  if(!hasContent) html+='<p style="text-align:center;padding:20px;color:#888">Engar skráðar máltíðir þennan dag.</p>';

  el.innerHTML=html;
  document.getElementById('clickHint').style.display=hasContent?'flex':'none';
}

function showFruitInfo(){
  var html='<h2 class="modaltitle">Ferskir ávextir alla daga</h2><p>Val á ávöxtum getur verið mismunandi milli daga og skóla. Ávextir eru valdir með það að markmiði að tryggja góða nýtingu hráefna og draga úr matarsóun.</p>';
  openModal(html);
}

function selectDay(dk){
  currentDay=dk;
  document.querySelectorAll('.daybtn').forEach(function(b){b.classList.toggle('active',b.getAttribute('onclick').indexOf("'"+dk+"'")>=0);});
  renderDay();
}

// ═══ HLEÐSLA ═══
function loadAll(){
  return fetch(EXCEL_URL,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.arrayBuffer();})
    .then(function(buf){
      var wb=XLSX.read(buf,{type:'array',cellDates:false,raw:false});
      mRows=parseMenuRows(sheetRows(wb,'Grunnmatseðill'));
      vsMap=parseVoruskra(sheetRows(wb,'Vöruskrá'));
      barnData=findBarn(wb,barnId);
      console.log('Hlaðið: mRows='+mRows.length+' barn='+JSON.stringify(barnData));
    });
}

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded',function(){
  barnId=getBarnId();
  if(!barnId){
    document.getElementById('mainArea').innerHTML='<div class="not-found"><h2>Hlekkur finnst ekki</h2><p>Þessi hlekkur er ekki gildur. Hafðu samband við skólann þinn.</p></div>';
    return;
  }

  updateWeekLabels();
  document.addEventListener('keydown',function(e){if(e.key==='Escape') closeModal();});
  document.getElementById('infoModal').addEventListener('click',function(e){if(e.target===document.getElementById('infoModal'))closeModal();});
  document.addEventListener('click',function(e){var dd=document.querySelector('.weekdropdown');if(dd&&!dd.contains(e.target))closeWeekMenu();});

  loadAll().then(function(){
    if(!barnData){
      document.getElementById('mainArea').innerHTML='<div class="not-found"><h2>Barn finnst ekki</h2><p>Þessi hlekkur er ekki gildur. Hafðu samband við skólann þinn.</p></div>';
      return;
    }

    // Sýna barn kort
    var kort=document.getElementById('barnKort');
    kort.style.display='flex';
    document.getElementById('barnNafn').textContent=barnData.nafn;
    document.getElementById('barnSkoli').textContent=barnData.skoli+(barnData.deild?' — '+barnData.deild:'');

    var ofnDiv=document.getElementById('barnOfnaemi');
    if(barnData.ofnaemi){
      barnData.ofnaemi.split(',').forEach(function(o){
        o=o.trim();if(!o)return;
        var tag=document.createElement('span');
        tag.className='ofn-tag'+(o.toLowerCase().indexOf('bráð')>=0?' brada':'');
        tag.textContent=o;
        ofnDiv.appendChild(tag);
      });
    }

    // Sýna dagaval
    document.getElementById('dayNav').style.display='flex';

    // Velja daginn í dag
    var dk=dayKey(new Date())||'Man';
    selectDay(dk);

  }).catch(function(err){
    document.getElementById('mainArea').innerHTML='<div class="loading">Villa: '+esc(String(err))+'</div>';
  });
});
